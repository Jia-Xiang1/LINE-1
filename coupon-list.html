<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的優惠券</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", sans-serif;
      background: radial-gradient(circle at top, #fff7ef 0%, #f8f1e7 35%, #f3eee8 100%);
      color: #2d1500;
      min-height: 100vh;
      padding: 20px 14px 28px;
    }

    .wrap {
      max-width: 780px;
      margin: 0 auto;
    }

    .top-deco {
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #c9341a 0%, #d7a423 50%, #c9341a 100%);
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(201, 52, 26, 0.18);
    }

    .header-card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 24px;
      padding: 22px 18px 18px;
      box-shadow: 0 10px 30px rgba(86, 45, 10, 0.08), 0 2px 10px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(201, 52, 26, 0.08);
      backdrop-filter: blur(4px);
      position: relative;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .header-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, #c9341a 0%, #d7a423 50%, #c9341a 100%);
    }

    .brand-small {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.28em;
      color: rgba(201, 52, 26, 0.75);
      margin-bottom: 8px;
      font-weight: 700;
    }

    .title {
      font-size: 28px;
      font-weight: 900;
      color: #c9341a;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .subtitle {
      color: #6f6259;
      font-size: 14px;
      line-height: 1.8;
    }

    .hint {
      margin-top: 10px;
      color: #8b8078;
      font-size: 12px;
      line-height: 1.7;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 11px 15px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.2s ease;
    }

    button:active { transform: scale(0.99); }

    .btn-refresh {
      background: #fff;
      color: #c9341a;
      border: 1px solid rgba(201, 52, 26, 0.18);
    }

    .btn-refresh:hover {
      opacity: 0.95;
    }

    .section-title {
      margin: 22px 0 12px;
      font-size: 18px;
      font-weight: 900;
      color: #8b1a0a;
      padding-left: 4px;
    }

    .coupon-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(86, 45, 10, 0.06), 0 2px 8px rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(201, 52, 26, 0.08);
      position: relative;
      overflow: hidden;
    }

    .coupon-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 6px;
      bottom: 0;
      background: linear-gradient(180deg, #c9341a 0%, #d7a423 100%);
      opacity: 0.9;
    }

    .coupon-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
      padding-left: 8px;
    }

    .coupon-name {
      font-size: 20px;
      font-weight: 900;
      color: #c9341a;
      line-height: 1.4;
    }

    .badge {
      display: inline-block;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
    }

    .badge-pending {
      background: #fff2cc;
      color: #8a6d1d;
    }

    .badge-available {
      background: #e9f8ec;
      color: #187a2f;
    }

    .badge-used {
      background: #ececec;
      color: #666;
    }

    .badge-expired {
      background: #fdeaea;
      color: #b42318;
    }

    .meta-box {
      margin-left: 8px;
      background: #fffaf4;
      border: 1px dashed rgba(201, 52, 26, 0.18);
      border-radius: 16px;
      padding: 12px 14px;
    }

    .meta {
      font-size: 14px;
      line-height: 1.95;
      color: #4c433d;
    }

    .meta strong {
      color: #8b1a0a;
      font-weight: 800;
    }

    .card-actions {
      margin-top: 14px;
      margin-left: 8px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-use {
      background: linear-gradient(135deg, #c9341a 0%, #8b1a0a 100%);
      color: #fff;
      box-shadow: 0 8px 18px rgba(201, 52, 26, 0.16);
    }

    .btn-use:hover {
      opacity: 0.96;
    }

    .btn-use:disabled {
      background: #c9c9c9;
      color: #fff;
      cursor: not-allowed;
      box-shadow: none;
    }

    .small {
      font-size: 12px;
      color: #8f847d;
      margin-top: 8px;
      margin-left: 8px;
      line-height: 1.7;
    }

    .empty,
    .loading,
    .error {
      background: rgba(255,255,255,0.94);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(86, 45, 10, 0.06), 0 2px 8px rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(201, 52, 26, 0.08);
    }

    .error {
      color: #b42318;
      background: linear-gradient(180deg, #fff5f4 0%, #fff0ef 100%);
      border: 1px solid #f0c9c4;
    }

    .footer-note {
      text-align: center;
      margin-top: 18px;
      font-size: 11px;
      color: #9b8f87;
      letter-spacing: 0.08em;
    }

    @media (max-width: 520px) {
      .title { font-size: 24px; }
      .coupon-name { font-size: 18px; }
      .coupon-top {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-deco"></div>

    <div class="header-card">
      <div class="brand-small">我的優惠券</div>
      <div class="title">查看你的已領優惠券</div>
      <div class="subtitle">
        可查看活動類別、名稱、分類、領取日、啟用日、使用日、到期日與使用狀態。<br />
        顧客出示本畫面後，由店員於此頁面下方按下「店員確認使用」。
      </div>
      <div class="hint">
        排序方式：先依活動類別，再依分類分組；同組內快到期且可使用的券會優先顯示。
      </div>

      <div class="actions">
        <button class="btn-refresh" onclick="loadCoupons()">重新整理</button>
      </div>
    </div>

    <div id="couponList" class="loading">載入中...</div>

    <div class="footer-note">
      請於有效期限內使用，逾期將自動失效
    </div>
  </div>

<script>
const liffId = "2009551865-e6Y0VCE6";
const gasUrl = "https://script.google.com/macros/s/AKfycbzVYtkV9thzA_G7hYJoSvboxC6paKm0F_rDaScWhVX6HmSVGZe8muRny2V0-RYdzM_S/exec";

async function init() {
  try {
    await liff.init({ liffId });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    await loadCoupons();
  } catch (err) {
    document.getElementById("couponList").innerHTML =
      '<div class="error">載入失敗：' + escapeHtml(err.message) + '</div>';
    console.error(err);
  }
}

async function postToGas(payload) {
  const formBody = new URLSearchParams(payload).toString();

  const res = await fetch(gasUrl, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: formBody
  });

  const text = await res.text();

  try {
    return JSON.parse(text);
  } catch (e) {
    throw new Error("伺服器回應格式錯誤：" + text);
  }
}

async function loadCoupons() {
  try {
    document.getElementById("couponList").innerHTML =
      '<div class="loading">載入中...</div>';

    const profile = await liff.getProfile();

    const result = await postToGas({
      action: "list",
      userId: profile.userId
    });

    if (!result.success || !result.items || result.items.length === 0) {
      document.getElementById("couponList").innerHTML =
        '<div class="empty">目前沒有優惠券</div>';
      return;
    }

    const items = result.items.map(item => {
      const claimedAtDate = toDate(item.claimedAt);
      const activateAtDate = toDate(item.activateAt);
      const usedAtDate = item.usedAt ? toDate(item.usedAt) : null;
      const expireAtDate = toDate(item.expireAt);
      const displayStatus = getDisplayStatus(item.status, activateAtDate, expireAtDate);

      return {
        ...item,
        claimedAtDate,
        activateAtDate,
        usedAtDate,
        expireAtDate,
        displayStatus
      };
    });

    items.sort((a, b) => {
      if (a.eventType !== b.eventType) {
        return a.eventType.localeCompare(b.eventType, "zh-Hant");
      }

      if (a.category !== b.category) {
        return a.category.localeCompare(b.category, "zh-Hant");
      }

      if (a.displayStatus.order !== b.displayStatus.order) {
        return a.displayStatus.order - b.displayStatus.order;
      }

      return a.expireAtDate - b.expireAtDate;
    });

    const groups = {};
    items.forEach(item => {
      const groupKey = `${item.eventType}｜${item.category}`;
      if (!groups[groupKey]) groups[groupKey] = [];
      groups[groupKey].push(item);
    });

    let html = '';

    Object.keys(groups).forEach(groupKey => {
      const [eventType, category] = groupKey.split('｜');
      html += `<div class="section-title">${escapeHtml(eventType)}｜${escapeHtml(category)}</div>`;

      groups[groupKey].forEach(item => {
        const canUse = item.displayStatus.text === "可使用";

        html += `
          <div class="coupon-card">
            <div class="coupon-top">
              <div class="coupon-name">${escapeHtml(item.couponName)}</div>
              <span class="badge ${item.displayStatus.className}">
                ${item.displayStatus.text}
              </span>
            </div>

            <div class="meta-box">
              <div class="meta">
                <div><strong>活動類別：</strong>${escapeHtml(item.eventType)}</div>
                <div><strong>名稱：</strong>${escapeHtml(item.couponName)}</div>
                <div><strong>分類：</strong>${escapeHtml(item.category)}</div>
                <div><strong>領取日：</strong>${formatDate(item.claimedAtDate)}</div>
                <div><strong>啟用日：</strong>${formatDate(item.activateAtDate)}</div>
                <div><strong>使用日：</strong>${item.usedAtDate ? formatDate(item.usedAtDate) : "尚未使用"}</div>
                <div><strong>到期日：</strong>${formatDate(item.expireAtDate)}</div>
                <div><strong>品項代碼：</strong>${escapeHtml(item.couponNameCode)}</div>
                <div><strong>券號：</strong>${escapeHtml(item.couponId)}</div>
              </div>
            </div>

            <div class="card-actions">
              <button
                class="btn-use"
                onclick="useCoupon('${escapeJs(item.couponId)}')"
                ${canUse ? "" : "disabled"}
              >
                店員確認使用
              </button>
            </div>

            <div class="small">
              顧客出示本畫面後，由店員按下此按鈕，系統即會回傳為已使用。
            </div>
          </div>
        `;
      });
    });

    document.getElementById("couponList").innerHTML = html;
  } catch (err) {
    document.getElementById("couponList").innerHTML =
      '<div class="error">載入失敗：' + escapeHtml(err.message) + '</div>';
    console.error(err);
  }
}

async function useCoupon(couponId) {
  try {
    const ok = confirm("請確認店員已核對並同意使用，是否回傳為已使用？");
    if (!ok) return;

    const result = await postToGas({
      action: "use",
      couponId: couponId
    });

    alert(result.message || (result.success ? "已更新為已使用" : "更新失敗"));
    await loadCoupons();
  } catch (err) {
    alert("操作失敗：" + err.message);
    console.error(err);
  }
}

function getDisplayStatus(status, activateAtDate, expireAtDate) {
  const now = new Date();

  if (status === "已使用") {
    return { text: "已使用", className: "badge-used", order: 4 };
  }

  if (now < activateAtDate) {
    return { text: "未啟用", className: "badge-pending", order: 2 };
  }

  if (now > expireAtDate) {
    return { text: "已過期", className: "badge-expired", order: 3 };
  }

  return { text: "可使用", className: "badge-available", order: 1 };
}

function toDate(value) {
  return new Date(value);
}

function formatDate(d) {
  if (!(d instanceof Date) || isNaN(d.getTime())) return "";
  return d.toLocaleString("zh-TW");
}

function escapeHtml(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function escapeJs(str) {
  return String(str || "").replaceAll("'", "\\'");
}

init();
</script>
</body>
</html>
