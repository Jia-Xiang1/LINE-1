<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的優惠券</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang TC","Noto Sans TC",Arial,sans-serif;
      background:
        radial-gradient(circle at top, #311508 0%, #17100c 40%, #0b0b0b 100%);
      color: #fff4e5;
      min-height: 100vh;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }
    .head {
      text-align: center;
      margin-bottom: 18px;
    }
    .title {
      font-size: 30px;
      font-weight: 900;
      color: #ffd39d;
      margin-bottom: 6px;
    }
    .sub {
      color: #fcd9b6;
      font-size: 14px;
      line-height: 1.6;
    }
    .user-box, .group-card, .empty-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,214,153,0.18);
      border-radius: 22px;
      box-shadow: 0 0 24px rgba(255,166,77,0.10);
      padding: 16px;
      margin-bottom: 16px;
    }
    .user-box {
      line-height: 1.8;
      font-size: 14px;
      word-break: break-word;
    }
    .group-title {
      font-size: 22px;
      font-weight: 900;
      color: #ffd39d;
      margin-bottom: 12px;
    }
    .coupon-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .coupon-card {
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px;
    }
    .coupon-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .event-name {
      font-size: 13px;
      color: #ffc98e;
      font-weight: 700;
    }
    .coupon-name {
      font-size: 20px;
      font-weight: 900;
      line-height: 1.4;
    }
    .pill {
      flex-shrink: 0;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 900;
    }
    .ready { background: #166534; color: #dcfce7; }
    .pending { background: #92400e; color: #fef3c7; }
    .used { background: #374151; color: #e5e7eb; }
    .expired { background: #7f1d1d; color: #fee2e2; }

    .info {
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 12px;
      line-height: 1.9;
      font-size: 14px;
      margin-top: 10px;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      border: 0;
      border-radius: 14px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }
    .btn-main {
      background: linear-gradient(180deg, #ffba52, #ff8c1a);
      color: #2a1300;
    }
    .btn-disabled {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      cursor: not-allowed;
    }
    .empty-card {
      text-align: center;
      color: #fcd9b6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="title">我的優惠券</div>
      <div class="sub">依券別分類分組，類別內依到期日排序</div>
    </div>

    <div class="user-box">
      LINE 名稱：<span id="displayName">讀取中...</span><br>
      LINE userId：<span id="userId">讀取中...</span>
    </div>

    <div id="couponContainer">
      <div class="empty-card">讀取中...</div>
    </div>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzoMJy0JJGJ46tXEn9U4cjggpIZ6UugAy6tiZs67NwaWibb0i0wuh73O6aer_TCCTKo/exec';
    const LIFF_ID = '2009551865-e6Y0VCE6';

    let profileData = { userId: '', displayName: '' };

    async function apiGet(action, params = {}) {
      const url = new URL(GAS_API_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null) url.searchParams.set(k, v);
      });
      const res = await fetch(url.toString());
      return await res.json();
    }

    async function apiPost(payload) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function initLiff() {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: window.location.href });
        return;
      }

      const profile = await liff.getProfile();
      profileData.userId = profile.userId || '';
      profileData.displayName = profile.displayName || '';

      document.getElementById('displayName').textContent = profileData.displayName || '-';
      document.getElementById('userId').textContent = profileData.userId || '-';
    }

    function getStatusClass(status) {
      if (status === '可使用') return 'ready';
      if (status === '未啟用') return 'pending';
      if (status === '已使用') return 'used';
      if (status === '已過期') return 'expired';
      return 'used';
    }

    function renderCoupons(groupedData) {
      const container = document.getElementById('couponContainer');

      if (!Array.isArray(groupedData) || !groupedData.length) {
        container.innerHTML = `<div class="empty-card">目前尚未領取任何優惠券</div>`;
        return;
      }

      container.innerHTML = groupedData.map(group => `
        <div class="group-card">
          <div class="group-title">${escapeHtml(group.category || '未分類')}</div>
          <div class="coupon-list">
            ${(group.items || []).map(item => `
              <div class="coupon-card">
                <div class="coupon-head">
                  <div>
                    <div class="event-name">${escapeHtml(item.活動類別 || '')}</div>
                    <div class="coupon-name">${escapeHtml(item.couponName || '')}</div>
                  </div>
                  <div class="pill ${getStatusClass(item.liveStatus)}">
                    ${escapeHtml(item.liveStatus || '')}
                  </div>
                </div>

                <div class="info">
                  品項：${escapeHtml(item.品項 || '-')}<br>
                  分類：${escapeHtml(item.分類 || '-')}<br>
                  券別分類：${escapeHtml(item.category || '-')}<br>
                  發放方式：${escapeHtml(item.發放方式 || '-')}<br>
                  領取時間：${escapeHtml(item.claimAt || '-')}<br>
                  啟用日：${escapeHtml(item.activateAt || '-')}<br>
                  使用日：${escapeHtml(item.usedAt || '-')}<br>
                  到期日：${escapeHtml(item.expireAt || '-')}<br>
                  狀態：${escapeHtml(item.status || '-')}<br>
                  券號：${escapeHtml(item.couponId || '-')}<br>
                  備註：${escapeHtml(item.note || '-')}
                </div>

                <div class="actions">
                  ${item.liveStatus === '可使用'
                    ? `<button class="btn btn-main" onclick="redeemCoupon('${escapeAttr(item.couponId)}')">店員核銷</button>`
                    : `<button class="btn btn-disabled" disabled>${escapeHtml(item.liveStatus || '不可核銷')}</button>`
                  }
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    async function loadCoupons() {
      if (!profileData.userId) {
        document.getElementById('couponContainer').innerHTML = `<div class="empty-card">尚未取得使用者資訊</div>`;
        return;
      }

      try {
        const res = await apiGet('getMyCoupons', { userId: profileData.userId });
        if (!res || !res.success) {
          document.getElementById('couponContainer').innerHTML =
            `<div class="empty-card">${escapeHtml((res && res.message) || '讀取失敗')}</div>`;
          return;
        }
        renderCoupons(res.groupedData || []);
      } catch (err) {
        document.getElementById('couponContainer').innerHTML =
          `<div class="empty-card">讀取失敗：${escapeHtml(err.message)}</div>`;
      }
    }

    async function redeemCoupon(couponId) {
      if (!couponId) return;
      if (!profileData.userId) return alert('尚未取得使用者資料');
      if (!confirm('請確認已由店員核對，是否核銷此優惠券？')) return;

      try {
        const res = await apiPost({
          action: 'redeemCoupon',
          couponId,
          userId: profileData.userId
        });

        if (!res || !res.success) {
          alert((res && res.message) || '核銷失敗');
          return;
        }

        alert('核銷成功');
        await loadCoupons();
      } catch (err) {
        alert('核銷失敗：' + err.message);
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeAttr(str) {
      return String(str).replaceAll("'", "\\'");
    }

    async function initPage() {
      try {
        await initLiff();
        await loadCoupons();
      } catch (err) {
        document.getElementById('couponContainer').innerHTML =
          `<div class="empty-card">初始化失敗：${escapeHtml(err.message)}</div>`;
      }
    }

    initPage();
  </script>
</body>
</html>
