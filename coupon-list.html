<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的優惠券</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      margin: 0;
      background: #f5f6f8;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", sans-serif;
      color: #111;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 14px 40px;
      box-sizing: border-box;
    }
    .title {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 18px;
    }
    .empty {
      background: #fff;
      border-radius: 18px;
      padding: 28px 16px;
      text-align: center;
      color: #666;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }
    .coupon-card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }
    .coupon-name {
      font-size: 21px;
      font-weight: 800;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .coupon-meta {
      font-size: 14px;
      color: #444;
      line-height: 1.8;
    }
    .badge-row {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }
    .badge-type {
      background: #111;
      color: #fff;
    }
    .badge-status-default {
      background: #f0f0f0;
      color: #333;
    }
    .badge-status-pending {
      background: #fff3cd;
      color: #8a6300;
    }
    .badge-status-used {
      background: #e3f2fd;
      color: #0d47a1;
    }
    .badge-status-expired {
      background: #fbe9e7;
      color: #bf360c;
    }
    .note-box {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #f8f8f8;
      border: 1px solid #ececec;
    }
    .note-title {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 6px;
      color: #333;
    }
    .note-content {
      font-size: 14px;
      color: #555;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .small-tip {
      margin-top: 10px;
      font-size: 13px;
      color: #777;
      line-height: 1.6;
    }
    .use-btn,
    .used-btn {
      margin-top: 14px;
      width: 100%;
      min-height: 46px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: 800;
    }
    .use-btn {
      background: #111;
      color: #fff;
    }
    .used-btn {
      background: #d9d9d9;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">我的優惠券</div>
    <div id="couponList" class="empty">載入中...</div>
  </div>

  <script>
    const LIFF_ID = "2009551865-e6Y0VCE6";
    const API_BASE = "https://script.google.com/macros/s/AKfycbzGDuBy0OuzxnWLap5A6NB7xxT3lGC00MbJBGYthPxNEU5rwZ4te9zc4E8Z78TylV3A/exec";
    let currentUserId = "";

    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        currentUserId = profile.userId;
        await loadCoupons(currentUserId);
      } catch (err) {
        console.error(err);
        document.getElementById("couponList").innerHTML = "載入失敗";
      }
    }

    async function loadCoupons(userId) {
      try {
        const res = await fetch(
          `${API_BASE}?action=getUserCoupons&userId=${encodeURIComponent(userId)}`
        );
        const json = await res.json();

        if (!json.success) {
          document.getElementById("couponList").innerHTML =
            escapeHtml(json.message || "讀取失敗");
          return;
        }

        renderCoupons(json.data || []);
      } catch (err) {
        console.error(err);
        document.getElementById("couponList").innerHTML = "讀取失敗";
      }
    }

    async function markCouponUsed(couponId) {
      const ok = window.confirm("確認將此優惠券標記為已使用？");
      if (!ok) return;

      try {
        const res = await fetch(API_BASE, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            action: "markCouponUsed",
            userId: currentUserId,
            couponId: couponId
          })
        });

        const json = await res.json();

        if (!json.success) {
          alert(json.message || "更新失敗");
          return;
        }

        await loadCoupons(currentUserId);
      } catch (err) {
        console.error(err);
        alert("更新失敗");
      }
    }

    function renderCoupons(list) {
      const root = document.getElementById("couponList");

      if (!list.length) {
        root.className = "empty";
        root.innerHTML = "目前尚未領取任何優惠券";
        return;
      }

      root.className = "";

      root.innerHTML = list.map(item => {
        const status = item.displayStatus || item.status || "未使用";
        const statusClass = getStatusClass(status);

        let extraTip = "";
        if (status === "尚未生效") {
          extraTip = `<div class="small-tip">此券尚未到可使用日期，請於啟用日後再使用。</div>`;
        } else if (status === "已過期") {
          extraTip = `<div class="small-tip">此券已超過可使用期限。</div>`;
        }

        const canUse = status === "未使用";

        return `
          <div class="coupon-card">
            <div class="coupon-name">${escapeHtml(item.couponName || item["品項"] || "")}</div>

            <div class="coupon-meta">
              分類：${escapeHtml(item.category || item["分類"] || "")}<br>
              啟用日：${escapeHtml(item.activateAt || "")}<br>
              到期日：${escapeHtml(item.expireAt || "")}<br>
              券號：${escapeHtml(item.couponId || "")}
            </div>

            <div class="badge-row">
              <span class="badge badge-type">${escapeHtml(item.eventType || item["活動類別"] || "優惠券")}</span>
              <span class="badge ${statusClass}">${escapeHtml(status)}</span>
            </div>

            ${item.note ? `
              <div class="note-box">
                <div class="note-title">使用備註</div>
                <div class="note-content">${escapeHtml(item.note)}</div>
              </div>
            ` : ""}

            ${extraTip}

            ${
              canUse
                ? `<button class="use-btn" onclick="markCouponUsed('${escapeHtml(item.couponId || "")}')">確認使用</button>`
                : `<button class="used-btn" disabled>已使用</button>`
            }
          </div>
        `;
      }).join("");
    }

    function getStatusClass(status) {
      if (status === "尚未生效") return "badge-status-pending";
      if (status === "已使用") return "badge-status-used";
      if (status === "已過期") return "badge-status-expired";
      return "badge-status-default";
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    init();
  </script>
</body>
</html>
