<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的優惠券</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f6f0e4;
      --bg-card: rgba(255,255,255,0.56);
      --primary: #c63b1e;
      --text: #7a2f1d;
      --text-soft: #9a6d5f;
      --border: rgba(198, 59, 30, 0.10);
      --shadow: 0 10px 24px rgba(152, 73, 35, 0.08);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang TC","Noto Sans TC",Arial,sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.55), rgba(255,255,255,0) 30%),
        repeating-radial-gradient(circle at 50% -180px,
          transparent 0 120px,
          rgba(198,59,30,0.015) 120px 122px),
        var(--bg);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.45;
      background-image:
        url("data:image/svg+xml,%3Csvg width='160' height='64' viewBox='0 0 160 64' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 32C13.333 21.333 26.667 16 40 16s26.667 5.333 40 16 26.667 16 40 16 26.667-5.333 40-16' fill='none' stroke='%23d36b55' stroke-width='1.2' stroke-opacity='0.16'/%3E%3C/svg%3E");
      background-size: 160px 64px;
      background-repeat: repeat;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 54px;
      background: #0b0b0b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      letter-spacing: 1px;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 22px 16px 40px;
      position: relative;
      z-index: 1;
    }

    .hero {
      text-align: center;
      margin-bottom: 18px;
    }

    .badge-line {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--primary);
      font-size: 15px;
      margin-bottom: 8px;
    }

    .badge-line::before,
    .badge-line::after {
      content: "";
      width: 44px;
      height: 2px;
      border-radius: 999px;
      background: rgba(198, 59, 30, 0.5);
    }

    .hero-title {
      font-size: 34px;
      line-height: 1.2;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--text-soft);
      line-height: 1.7;
    }

    .user-box,
    .group-card,
    .empty-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 28px;
      padding: 18px;
      backdrop-filter: blur(8px);
      margin-bottom: 16px;
    }

    .user-box {
      line-height: 1.9;
      font-size: 14px;
      word-break: break-word;
    }

    .group-title {
      font-size: 24px;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 14px;
      text-align: center;
    }

    .coupon-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .coupon-card {
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(198,59,30,0.08);
      border-radius: 22px;
      padding: 14px;
    }

    .coupon-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      align-items: flex-start;
    }

    .event-name {
      font-size: 13px;
      color: var(--text-soft);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .coupon-name {
      font-size: 21px;
      font-weight: 900;
      line-height: 1.45;
      color: var(--primary);
      word-break: break-word;
    }

    .pill {
      flex-shrink: 0;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .ready { background: rgba(47,133,90,0.12); color: #2f855a; }
    .pending { background: rgba(180,83,9,0.12); color: #b45309; }
    .used { background: rgba(55,65,81,0.12); color: #374151; }
    .expired { background: rgba(197,48,48,0.10); color: #c53030; }

    .info {
      background: rgba(255,255,255,0.48);
      border-radius: 16px;
      padding: 12px;
      line-height: 1.9;
      font-size: 14px;
      color: var(--text);
      word-break: break-word;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .btn-main {
      color: white;
      background: linear-gradient(180deg, #d53a20 0%, #c22e19 45%, #c12619 100%);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.12),
        0 10px 18px rgba(198,59,30,0.18);
    }

    .btn-disabled {
      background: rgba(255,255,255,0.70);
      color: rgba(122,47,29,0.55);
      cursor: not-allowed;
      border: 1px solid rgba(198,59,30,0.08);
    }

    .empty-card {
      text-align: center;
      color: var(--text-soft);
      line-height: 1.8;
      font-size: 15px;
    }

    @media (max-width: 640px) {
      .hero-title {
        font-size: 28px;
      }

      .coupon-name {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">我的優惠券</div>

  <div class="wrap">
    <div class="hero">
      <div class="badge-line">我的券包</div>
      <div class="hero-sub">依券別分類分組，並依到期日排序</div>
    </div>

    <div class="user-box">
      LINE 名稱：<span id="displayName">讀取中...</span><br>
      LINE userId：<span id="userId">讀取中...</span>
    </div>

    <div id="couponContainer">
      <div class="empty-card">讀取中...</div>
    </div>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyVZa4f4SM2yA35RGqVS1ij1bM47x88n6Zb_qfLOROCw8NSwTqD-8K_bmFZNY2jCZXz/exec';
    const LIFF_ID = '2009551865-e6Y0VCE6';

    let profileData = { userId: '', displayName: '' };

    function formatClaimDate(value) {
      if (!value || value === '-') return '-';

      const d = new Date(value);
      if (isNaN(d.getTime())) {
        return String(value).split(' ')[0] || String(value);
      }

      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}/${m}/${day}`;
    }

    async function apiGet(action, params = {}) {
      const url = new URL(GAS_API_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null) url.searchParams.set(k, v);
      });
      const res = await fetch(url.toString());
      return await res.json();
    }

    async function apiPost(payload) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function initLiff() {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: window.location.href });
        return;
      }

      const profile = await liff.getProfile();
      profileData.userId = profile.userId || '';
      profileData.displayName = profile.displayName || '';

      document.getElementById('displayName').textContent = profileData.displayName || '-';
      document.getElementById('userId').textContent = profileData.userId || '-';
    }

    function getStatusClass(status) {
      if (status === '可使用') return 'ready';
      if (status === '未啟用') return 'pending';
      if (status === '已使用') return 'used';
      if (status === '已過期') return 'expired';
      return 'used';
    }

    function renderCoupons(groupedData) {
      const container = document.getElementById('couponContainer');

      if (!Array.isArray(groupedData) || !groupedData.length) {
        container.innerHTML = `<div class="empty-card">目前尚未領取任何優惠券</div>`;
        return;
      }

      container.innerHTML = groupedData.map(group => `
        <div class="group-card">
          <div class="group-title">${escapeHtml(group.category || '未分類')}</div>
          <div class="coupon-list">
            ${(group.items || []).map(item => `
              <div class="coupon-card">
                <div class="coupon-head">
                  <div>
                    <div class="event-name">${escapeHtml(item.活動類別 || '')}</div>
                    <div class="coupon-name">${escapeHtml(item.couponName || '')}</div>
                  </div>
                  <div class="pill ${getStatusClass(item.liveStatus)}">
                    ${escapeHtml(item.liveStatus || '')}
                  </div>
                </div>

                <div class="info">
                  品項：${escapeHtml(item.品項 || '-')}<br>
                  分類：${escapeHtml(item.分類 || '-')}<br>
                  券別分類：${escapeHtml(item.category || '-')}<br>
                  領取日期：${escapeHtml(formatClaimDate(item.claimAt || '-'))}<br>
                  啟用日：${escapeHtml(item.activateAt || '-')}<br>
                  到期日：${escapeHtml(item.expireAt || '-')}<br>
                  使用日：${escapeHtml(item.usedAt || '-')}<br>
                  狀態：${escapeHtml(item.status || '-')}<br>
                  券號：${escapeHtml(item.couponId || '-')}<br>
                  備註：${escapeHtml(item.note || '-')}
                </div>

                <div class="actions">
                  ${item.liveStatus === '可使用'
                    ? `<button class="btn btn-main" onclick="redeemCoupon('${escapeAttr(item.couponId)}')">店員核銷</button>`
                    : `<button class="btn btn-disabled" disabled>${escapeHtml(item.liveStatus || '不可核銷')}</button>`
                  }
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    async function loadCoupons() {
      if (!profileData.userId) {
        document.getElementById('couponContainer').innerHTML =
          `<div class="empty-card">尚未取得使用者資訊</div>`;
        return;
      }

      try {
        const res = await apiGet('getMyCoupons', { userId: profileData.userId });

        if (!res || !res.success) {
          document.getElementById('couponContainer').innerHTML =
            `<div class="empty-card">${escapeHtml((res && res.message) || '讀取失敗')}</div>`;
          return;
        }

        renderCoupons(res.groupedData || []);
      } catch (err) {
        document.getElementById('couponContainer').innerHTML =
          `<div class="empty-card">讀取失敗：${escapeHtml(err.message)}</div>`;
      }
    }

    async function redeemCoupon(couponId) {
      if (!couponId) return;
      if (!profileData.userId) {
        alert('尚未取得使用者資料');
        return;
      }

      if (!confirm('請確認已由店員核對，是否核銷此優惠券？')) return;

      try {
        const res = await apiPost({
          action: 'redeemCoupon',
          couponId,
          userId: profileData.userId
        });

        if (!res || !res.success) {
          alert((res && res.message) || '核銷失敗');
          return;
        }

        alert('核銷成功');
        await loadCoupons();
      } catch (err) {
        alert('核銷失敗：' + err.message);
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeAttr(str) {
      return String(str).replaceAll("'", "\\'");
    }

    async function initPage() {
      try {
        await initLiff();
        await loadCoupons();
      } catch (err) {
        document.getElementById('couponContainer').innerHTML =
          `<div class="empty-card">初始化失敗：${escapeHtml(err.message)}</div>`;
      }
    }

    initPage();
  </script>
</body>
</html>
