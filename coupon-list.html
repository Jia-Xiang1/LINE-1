<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的優惠券</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      color: #111827;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 22px 16px 40px;
    }
    .header-card,
    .empty-card,
    .group-card {
      background: rgba(255,255,255,0.96);
      border-radius: 24px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      padding: 18px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
    }
    .sub {
      text-align: center;
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 12px;
      line-height: 1.6;
    }
    .user-line {
      text-align: center;
      font-size: 14px;
      color: #374151;
      line-height: 1.8;
      word-break: break-word;
    }
    .group-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 14px;
      color: #111827;
    }
    .coupon-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .coupon-card {
      background: #fff;
      border-radius: 20px;
      padding: 16px;
      border: 1px solid #e5e7eb;
    }
    .coupon-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .event-name {
      font-size: 14px;
      color: #6b7280;
      font-weight: 700;
    }
    .item-name {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.4;
      margin-top: 4px;
      word-break: break-word;
    }
    .status-badge {
      flex-shrink: 0;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }
    .status-ready {
      background: #dcfce7;
      color: #166534;
    }
    .status-pending {
      background: #fef3c7;
      color: #92400e;
    }
    .status-used {
      background: #e5e7eb;
      color: #374151;
    }
    .status-expired {
      background: #fee2e2;
      color: #991b1b;
    }
    .coupon-info {
      background: #f9fafb;
      border-radius: 16px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.9;
      color: #374151;
    }
    .coupon-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }
    .btn-redeem {
      background: #111827;
      color: white;
    }
    .btn-disabled {
      background: #e5e7eb;
      color: #6b7280;
      cursor: not-allowed;
    }
    .empty-card {
      text-align: center;
      color: #6b7280;
      font-size: 15px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header-card">
      <div class="title">我的優惠券</div>
      <div class="sub">依券別類別分組，類別內依最接近到期日排序</div>
      <div class="user-line">
        LINE 名稱：<span id="displayName">讀取中...</span><br>
        LINE userId：<span id="userId">讀取中...</span>
      </div>
    </div>

    <div id="couponContainer">
      <div class="empty-card">讀取中...</div>
    </div>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwp1KP5xrCUXw9TvwBOEEwu1aE-yjdsxKU2gfQXX1k8hR7vlPCR0-W6bGSgWJpmjUA1/exec';
    const LIFF_ID = '你的LIFF_ID';

    let profileData = { userId: '', displayName: '' };

    async function apiGet(action, params = {}) {
      const url = new URL(GAS_API_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null) url.searchParams.set(k, v);
      });

      const res = await fetch(url.toString());
      return await res.json();
    }

    async function apiPost(payload) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function initLiff() {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: window.location.href });
        return;
      }

      const profile = await liff.getProfile();
      profileData.userId = profile.userId || '';
      profileData.displayName = profile.displayName || '';

      document.getElementById('displayName').textContent = profileData.displayName || '-';
      document.getElementById('userId').textContent = profileData.userId || '-';
    }

    function getStatusClass(status) {
      if (status === '可使用') return 'status-ready';
      if (status === '未啟用') return 'status-pending';
      if (status === '已使用') return 'status-used';
      if (status === '已過期') return 'status-expired';
      return 'status-used';
    }

    function renderGroupedCoupons(groupedData) {
      const container = document.getElementById('couponContainer');

      if (!Array.isArray(groupedData) || !groupedData.length) {
        container.innerHTML = `
          <div class="empty-card">
            目前尚未領取任何優惠券
          </div>
        `;
        return;
      }

      container.innerHTML = groupedData.map(group => `
        <div class="group-card">
          <div class="group-title">${escapeHtml(group.category || '未分類')}</div>
          <div class="coupon-list">
            ${(group.items || []).map(item => `
              <div class="coupon-card">
                <div class="coupon-head">
                  <div>
                    <div class="event-name">${escapeHtml(item.eventName || '')}</div>
                    <div class="item-name">${escapeHtml(item.itemName || '')}</div>
                  </div>
                  <div class="status-badge ${getStatusClass(item.status)}">
                    ${escapeHtml(item.status || '')}
                  </div>
                </div>

                <div class="coupon-info">
                  類別：${escapeHtml(item.category || '-')}<br>
                  領取日：${escapeHtml(item.claimDate || '-')}<br>
                  啟用日：${escapeHtml(item.activeDate || '-')}<br>
                  使用日：${escapeHtml(item.useDate || '-')}<br>
                  截止日：${escapeHtml(item.expireDate || '-')}<br>
                  使用狀態：${escapeHtml(item.used || '否')}
                </div>

                <div class="coupon-actions">
                  ${item.status === '可使用'
                    ? `<button class="btn btn-redeem" onclick="redeemCoupon('${escapeAttr(item.recordId)}')">店員核銷</button>`
                    : `<button class="btn btn-disabled" disabled>${escapeHtml(item.status || '不可核銷')}</button>`
                  }
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    async function loadMyCoupons() {
      if (!profileData.userId) {
        document.getElementById('couponContainer').innerHTML =
          '<div class="empty-card">尚未取得使用者資料</div>';
        return;
      }

      try {
        const res = await apiGet('getMyCoupons', { userId: profileData.userId });

        if (!res || !res.success) {
          document.getElementById('couponContainer').innerHTML =
            `<div class="empty-card">${escapeHtml((res && res.message) || '載入失敗')}</div>`;
          return;
        }

        renderGroupedCoupons(res.groupedData || []);
      } catch (err) {
        document.getElementById('couponContainer').innerHTML =
          `<div class="empty-card">載入失敗：${escapeHtml(err.message)}</div>`;
      }
    }

    async function redeemCoupon(recordId) {
      if (!recordId) return;

      if (!profileData.userId) {
        alert('尚未取得使用者資料');
        return;
      }

      if (!confirm('請確認已由店員核對，是否核銷此優惠券？')) return;

      try {
        const res = await apiPost({
          action: 'redeemCoupon',
          recordId,
          userId: profileData.userId
        });

        if (!res || !res.success) {
          alert((res && res.message) || '核銷失敗');
          return;
        }

        alert('核銷成功');
        await loadMyCoupons();
      } catch (err) {
        alert('核銷失敗：' + err.message);
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeAttr(str) {
      return String(str).replaceAll("'", "\\'");
    }

    async function initPage() {
      try {
        await initLiff();
        await loadMyCoupons();
      } catch (err) {
        document.getElementById('couponContainer').innerHTML =
          `<div class="empty-card">LIFF 初始化失敗：${escapeHtml(err.message)}</div>`;
      }
    }

    initPage();
  </script>
</body>
</html>
