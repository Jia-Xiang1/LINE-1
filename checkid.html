<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>查看我的LINE ID</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
body{
  font-family: Arial;
  text-align:center;
  margin-top:80px;
}
#uid{
  font-size:20px;
  word-break:break-all;
  margin-top:20px;
}
button{
  padding:10px 20px;
  font-size:16px;
}
</style>
</head>

<body>

<h2>你的 LINE UserID</h2>
<div id="uid">讀取中...</div>
<br>
<button onclick="copyId()">複製</button>

<script>

const liffId = "2009551865-PugHHMup";

async function main(){

  await liff.init({ liffId });

  if(!liff.isLoggedIn()){
    liff.login();
  }

  const profile = await liff.getProfile();

  document.getElementById("uid").innerText = profile.userId;

}

function copyId(){

  const text = document.getElementById("uid").innerText;

  navigator.clipboard.writeText(text);

  alert("已複製");

}

main();

</script>

</body>
</html>
