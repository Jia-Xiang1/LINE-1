<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>券別管理系統</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang TC","Noto Sans TC",Arial,sans-serif;
      background:
        radial-gradient(circle at top, #3b1f0f 0%, #1a0f08 35%, #0e0a08 70%, #080808 100%);
      color: #fff7ed;
      min-height: 100vh;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }
    .hero {
      text-align: center;
      margin-bottom: 18px;
    }
    .title {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(255, 179, 71, 0.28);
    }
    .sub {
      color: #fcd9b6;
      font-size: 14px;
      line-height: 1.7;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,214,153,0.18);
      box-shadow: 0 0 24px rgba(255,166,77,0.10);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 18px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field.full {
      grid-column: 1 / -1;
    }
    label {
      font-size: 13px;
      color: #ffd9a8;
      font-weight: 700;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid rgba(255,214,153,0.20);
      background: rgba(255,255,255,0.10);
      color: white;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }
    input::placeholder, textarea::placeholder {
      color: rgba(255,255,255,0.52);
    }
    textarea {
      resize: vertical;
      min-height: 88px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      border: 0;
      border-radius: 16px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }
    .btn-main {
      background: linear-gradient(180deg, #ffba52, #ff8c1a);
      color: #2a1300;
    }
    .btn-sub {
      background: rgba(255,255,255,0.12);
      color: #fff7ed;
      border: 1px solid rgba(255,214,153,0.18);
    }
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    .msg {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 700;
    }
    .ok { color: #86efac; }
    .err { color: #fca5a5; }

    .qr-wrap {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 18px;
      align-items: start;
      margin-top: 18px;
    }
    .qr-box {
      background: white;
      border-radius: 20px;
      padding: 12px;
      width: 220px;
      min-height: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #qrCanvas {
      width: 196px;
      height: 196px;
    }
    .url-box {
      word-break: break-all;
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px;
      line-height: 1.7;
      color: #ffe7c7;
    }

    .section-title {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 12px;
      color: #ffd39d;
    }

    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      min-width: 1200px;
      border-collapse: collapse;
    }
    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      font-size: 14px;
      vertical-align: top;
      color: #fff4e8;
    }
    th {
      color: #ffd39d;
      font-weight: 900;
    }
    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .mini-btn {
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 13px;
    }
    .status-pill {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }
    .on {
      background: #166534;
      color: #dcfce7;
    }
    .off {
      background: #7f1d1d;
      color: #fee2e2;
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .qr-wrap {
        grid-template-columns: 1fr;
      }
      .qr-box {
        width: 220px;
      }
      .title {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="title">券別管理系統</div>
      <div class="sub">新增、編輯、產生領券網址與 QR，並可直接下載 QR 圖片</div>
    </div>

    <div class="card">
      <input type="hidden" id="configId" />

      <div class="grid">
        <div class="field">
          <label>活動名稱</label>
          <input id="活動名稱" placeholder="例如：光碗抽獎" />
        </div>

        <div class="field">
          <label>品項</label>
          <input id="品項" placeholder="例如：現金折價券 $20元" />
        </div>

        <div class="field">
          <label>分類</label>
          <input id="分類" placeholder="例如：現金折價券 / 甜點 / 員工" />
        </div>

        <div class="field">
          <label>eventType</label>
          <input id="eventType" placeholder="例如：光碗抽獎" />
        </div>

        <div class="field">
          <label>couponName</label>
          <input id="couponName" placeholder="例如：現金折價券 $20元" />
        </div>

        <div class="field">
          <label>category</label>
          <input id="category" placeholder="例如：現金折價券" />
        </div>

        <div class="field">
          <label>發放方式</label>
          <select id="發放方式">
            <option value="qr">qr</option>
            <option value="QR/NFC">QR/NFC</option>
            <option value="NFC">NFC</option>
          </select>
        </div>

        <div class="field">
          <label>couponNameCode</label>
          <input id="couponNameCode" placeholder="例如：E01 / A02 / X00" />
        </div>

        <div class="field">
          <label>開始日</label>
          <input id="開始日" type="date" />
        </div>

        <div class="field">
          <label>截止日</label>
          <input id="截止日" type="date" />
        </div>

        <div class="field">
          <label>狀態</label>
          <select id="status">
            <option value="啟用">啟用</option>
            <option value="停用">停用</option>
          </select>
        </div>

        <div class="field">
          <label>備註</label>
          <input id="note" placeholder="例如：現折不可找零" />
        </div>

        <div class="field full">
          <label>生成網址</label>
          <textarea id="claimUrl" readonly placeholder="儲存後自動生成"></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn-main" onclick="saveConfig()">儲存券別</button>
        <button class="btn-sub" onclick="resetForm()">清空重填</button>
        <button class="btn-sub" onclick="copyUrl()">複製網址</button>
        <button class="btn-sub" onclick="generateQr()">生成 QR</button>
        <button class="btn-sub" onclick="downloadQr()">下載 QR</button>
      </div>

      <div id="message" class="msg"></div>

      <div class="qr-wrap">
        <div class="qr-box">
          <canvas id="qrCanvas"></canvas>
        </div>
        <div class="url-box" id="qrText">尚未生成 QR</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">已建立券別</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>活動名稱</th>
              <th>品項</th>
              <th>分類</th>
              <th>couponNameCode</th>
              <th>開始日</th>
              <th>截止日</th>
              <th>狀態</th>
              <th>網址</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="9">讀取中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzoMJy0JJGJ46tXEn9U4cjggpIZ6UugAy6tiZs67NwaWibb0i0wuh73O6aer_TCCTKo/exec';
    const CLAIM_PAGE_BASE_URL = 'https://jia-xiang1.github.io/LINE-1/claim.html';

    let couponConfigs = [];

    function setMessage(text, isError = false) {
      const el = document.getElementById('message');
      el.textContent = text || '';
      el.className = 'msg ' + (isError ? 'err' : 'ok');
    }

    function getFormData() {
      return {
        id: document.getElementById('configId').value.trim(),
        活動名稱: document.getElementById('活動名稱').value.trim(),
        品項: document.getElementById('品項').value.trim(),
        分類: document.getElementById('分類').value.trim(),
        eventType: document.getElementById('eventType').value.trim(),
        couponName: document.getElementById('couponName').value.trim(),
        category: document.getElementById('category').value.trim(),
        發放方式: document.getElementById('發放方式').value,
        couponNameCode: document.getElementById('couponNameCode').value.trim(),
        開始日: document.getElementById('開始日').value,
        截止日: document.getElementById('截止日').value,
        status: document.getElementById('status').value,
        note: document.getElementById('note').value.trim()
      };
    }

    function setFormData(item) {
      document.getElementById('configId').value = item.id || '';
      document.getElementById('活動名稱').value = item.活動名稱 || '';
      document.getElementById('品項').value = item.品項 || '';
      document.getElementById('分類').value = item.分類 || '';
      document.getElementById('eventType').value = item.eventType || '';
      document.getElementById('couponName').value = item.couponName || '';
      document.getElementById('category').value = item.category || '';
      document.getElementById('發放方式').value = item.發放方式 || 'qr';
      document.getElementById('couponNameCode').value = item.couponNameCode || '';
      document.getElementById('開始日').value = normalizeDate(item.開始日 || '');
      document.getElementById('截止日').value = normalizeDate(item.截止日 || '');
      document.getElementById('status').value = item.status || '啟用';
      document.getElementById('note').value = item.note || '';
      document.getElementById('claimUrl').value = item.claimUrl || '';
      document.getElementById('qrText').textContent = item.claimUrl || '尚未生成 QR';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function normalizeDate(value) {
      return String(value || '').replaceAll('/', '-');
    }

    function resetForm() {
      document.getElementById('configId').value = '';
      document.getElementById('活動名稱').value = '';
      document.getElementById('品項').value = '';
      document.getElementById('分類').value = '';
      document.getElementById('eventType').value = '';
      document.getElementById('couponName').value = '';
      document.getElementById('category').value = '';
      document.getElementById('發放方式').value = 'qr';
      document.getElementById('couponNameCode').value = '';
      document.getElementById('開始日').value = '';
      document.getElementById('截止日').value = '';
      document.getElementById('status').value = '啟用';
      document.getElementById('note').value = '';
      document.getElementById('claimUrl').value = '';
      document.getElementById('qrText').textContent = '尚未生成 QR';
      const canvas = document.getElementById('qrCanvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      setMessage('');
    }

    async function apiGet(action, params = {}) {
      const url = new URL(GAS_API_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null) url.searchParams.set(k, v);
      });
      const res = await fetch(url.toString());
      return await res.json();
    }

    async function apiPost(payload) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function saveConfig() {
      const data = getFormData();

      if (!data.活動名稱) return setMessage('請輸入活動名稱', true);
      if (!data.品項) return setMessage('請輸入品項', true);
      if (!data.分類) return setMessage('請輸入分類', true);
      if (!data.eventType) return setMessage('請輸入 eventType', true);
      if (!data.couponName) return setMessage('請輸入 couponName', true);
      if (!data.category) return setMessage('請輸入 category', true);
      if (!data.couponNameCode) return setMessage('請輸入 couponNameCode', true);
      if (!data.開始日) return setMessage('請輸入開始日', true);
      if (!data.截止日) return setMessage('請輸入截止日', true);
      if (data.開始日 > data.截止日) return setMessage('開始日不可晚於截止日', true);

      setMessage('儲存中...');

      try {
        const res = await apiPost({
          action: 'saveCouponConfig',
          ...data,
          claimPageBaseUrl: CLAIM_PAGE_BASE_URL
        });

        if (!res || !res.success) {
          setMessage((res && res.message) || '儲存失敗', true);
          return;
        }

        setMessage('儲存成功');
        setFormData(res.data || {});
        await loadConfigs();
        await generateQr();
      } catch (err) {
        setMessage('儲存失敗：' + err.message, true);
      }
    }

    async function deleteConfig(id) {
      if (!confirm('確定要刪除此券別嗎？')) return;

      try {
        const res = await apiPost({
          action: 'deleteCouponConfig',
          configId: id
        });

        if (!res || !res.success) {
          setMessage((res && res.message) || '刪除失敗', true);
          return;
        }

        setMessage('刪除成功');
        resetForm();
        await loadConfigs();
      } catch (err) {
        setMessage('刪除失敗：' + err.message, true);
      }
    }

    function copyUrl() {
      const text = document.getElementById('claimUrl').value.trim();
      if (!text) return setMessage('目前沒有可複製的網址', true);

      navigator.clipboard.writeText(text)
        .then(() => setMessage('網址已複製'))
        .catch(() => setMessage('複製失敗', true));
    }

    async function generateQr() {
      const text = document.getElementById('claimUrl').value.trim();
      if (!text) return setMessage('請先儲存券別並生成網址', true);

      const canvas = document.getElementById('qrCanvas');
      await QRCode.toCanvas(canvas, text, {
        width: 196,
        margin: 1
      });

      document.getElementById('qrText').textContent = text;
      setMessage('QR 已生成');
    }

    function downloadQr() {
      const canvas = document.getElementById('qrCanvas');
      const url = document.getElementById('claimUrl').value.trim();
      if (!url) return setMessage('請先生成 QR', true);

      const link = document.createElement('a');
      const code = document.getElementById('couponNameCode').value.trim() || 'coupon';
      link.download = `${code}-qr.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function editConfig(id) {
      const item = couponConfigs.find(x => x.id === id);
      if (!item) return;
      setFormData(item);
      generateQr();
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');

      if (!couponConfigs.length) {
        tbody.innerHTML = '<tr><td colspan="9">目前尚無資料</td></tr>';
        return;
      }

      tbody.innerHTML = couponConfigs.map(item => `
        <tr>
          <td>${escapeHtml(item.活動名稱 || '')}</td>
          <td>${escapeHtml(item.品項 || '')}</td>
          <td>${escapeHtml(item.分類 || '')}</td>
          <td>${escapeHtml(item.couponNameCode || '')}</td>
          <td>${escapeHtml(item.開始日 || '')}</td>
          <td>${escapeHtml(item.截止日 || '')}</td>
          <td>
            <span class="status-pill ${item.status === '啟用' ? 'on' : 'off'}">
              ${escapeHtml(item.status || '')}
            </span>
          </td>
          <td style="word-break:break-all;">${escapeHtml(item.claimUrl || '')}</td>
          <td>
            <div class="row-actions">
              <button class="btn-sub mini-btn" onclick="editConfig('${escapeAttr(item.id)}')">編輯</button>
              <button class="btn-danger mini-btn" onclick="deleteConfig('${escapeAttr(item.id)}')">刪除</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function loadConfigs() {
      try {
        const res = await apiGet('getCouponConfigs');
        couponConfigs = Array.isArray(res.data) ? res.data : [];
        renderTable();
      } catch (err) {
        document.getElementById('tableBody').innerHTML =
          `<tr><td colspan="9">讀取失敗：${escapeHtml(err.message)}</td></tr>`;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeAttr(str) {
      return String(str).replaceAll("'", "\\'");
    }

    loadConfigs();
  </script>
</body>
</html>
