<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>券別管理系統</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f6f0e4;
      --bg-card: rgba(255,255,255,0.55);
      --primary: #c63b1e;
      --text: #7a2f1d;
      --text-soft: #9a6d5f;
      --border: rgba(198, 59, 30, 0.10);
      --shadow: 0 10px 24px rgba(152, 73, 35, 0.08);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang TC","Noto Sans TC",Arial,sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.55), rgba(255,255,255,0) 30%),
        repeating-radial-gradient(circle at 50% -180px,
          transparent 0 120px,
          rgba(198,59,30,0.015) 120px 122px),
        var(--bg);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.45;
      background-image:
        url("data:image/svg+xml,%3Csvg width='160' height='64' viewBox='0 0 160 64' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 32C13.333 21.333 26.667 16 40 16s26.667 5.333 40 16 26.667 16 40 16 26.667-5.333 40-16' fill='none' stroke='%23d36b55' stroke-width='1.2' stroke-opacity='0.16'/%3E%3C/svg%3E");
      background-size: 160px 64px;
      background-repeat: repeat;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 54px;
      background: #0b0b0b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      letter-spacing: 1px;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 22px 16px 40px;
      position: relative;
      z-index: 1;
    }

    .section-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 28px;
      padding: 20px;
      backdrop-filter: blur(8px);
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 28px;
      font-weight: 900;
      color: var(--primary);
      text-align: center;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
    }

    input, select {
      width: 100%;
      border: 1.5px solid rgba(168, 88, 55, 0.18);
      background: rgba(145, 108, 92, 0.08);
      color: var(--text);
      border-radius: 22px;
      padding: 15px 18px;
      font-size: 16px;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15);
    }

    input::placeholder {
      color: rgba(122, 47, 29, 0.45);
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--text) 50%),
        linear-gradient(135deg, var(--text) 50%, transparent 50%);
      background-position:
        calc(100% - 24px) calc(50% - 4px),
        calc(100% - 17px) calc(50% - 4px);
      background-size: 7px 7px, 7px 7px;
      background-repeat: no-repeat;
      padding-right: 42px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 18px;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }

    .btn-main {
      min-width: 240px;
      color: white;
      background: linear-gradient(180deg, #d53a20 0%, #c22e19 45%, #c12619 100%);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.12),
        0 10px 18px rgba(198,59,30,0.18);
    }

    .btn-sub {
      background: rgba(255,255,255,0.75);
      color: var(--primary);
      border: 1px solid rgba(198,59,30,0.12);
    }

    .msg {
      text-align: center;
      margin-top: 14px;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.7;
      min-height: 28px;
    }

    .ok { color: #2f855a; }
    .err { color: #c53030; }

    .list-title {
      font-size: 24px;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 14px;
      text-align: center;
    }

    .simple-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .simple-item {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 10px;
      align-items: center;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.50);
      border: 1px solid rgba(198,59,30,0.08);
      cursor: pointer;
    }

    .simple-head {
      font-size: 13px;
      color: var(--text-soft);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .simple-value {
      font-size: 18px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1.4;
      word-break: break-word;
    }

    .detail-card {
      display: none;
      margin-top: 14px;
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(198,59,30,0.08);
      border-radius: 24px;
      padding: 18px;
    }

    .detail-title {
      font-size: 24px;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 12px;
      text-align: center;
    }

    .detail-info {
      line-height: 1.9;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 14px;
      word-break: break-word;
    }

    .qr-panel {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 18px;
      align-items: center;
    }

    .qr-card {
      background: white;
      border-radius: 28px;
      padding: 14px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 240px;
      min-height: 240px;
      margin: 0 auto;
    }

    #qrCanvas {
      width: 210px;
      height: 210px;
    }

    .qr-info {
      background: rgba(255,255,255,0.50);
      border-radius: 22px;
      border: 1px solid rgba(198,59,30,0.08);
      padding: 14px;
      color: var(--text-soft);
      line-height: 1.85;
      font-size: 14px;
      min-height: 110px;
    }

    .mini-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
      justify-content: center;
    }

    .mini-btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .mini-edit {
      background: rgba(255,255,255,0.90);
      color: var(--primary);
      border: 1px solid rgba(198,59,30,0.12);
    }

    .mini-delete {
      background: #c53030;
      color: white;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .simple-item {
        grid-template-columns: 1fr;
      }

      .qr-panel {
        grid-template-columns: 1fr;
      }

      .section-title {
        font-size: 24px;
      }

      .simple-value {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">券別管理系統</div>

  <div class="wrap">
    <div class="section-card">
      <div class="section-title">建立券別</div>

      <input type="hidden" id="configId" />

      <div class="grid">
        <div class="field">
          <label>活動名稱</label>
          <input id="活動名稱" placeholder="例如：光碗抽獎" />
        </div>

        <div class="field">
          <label>品項</label>
          <input id="品項" placeholder="例如：竹莢魚乙雙" />
        </div>

        <div class="field">
          <label>分類</label>
          <input id="分類" placeholder="例如：精選單點" />
        </div>

        <div class="field">
          <label>發放方式</label>
          <select id="發放方式">
            <option value="qr">qr</option>
            <option value="QR/NFC">QR/NFC</option>
            <option value="NFC">NFC</option>
          </select>
        </div>

        <div class="field">
          <label>券別代碼</label>
          <input id="couponNameCode" placeholder="例如：C08" />
        </div>

        <div class="field">
          <label>啟用方式</label>
          <select id="啟用方式">
            <option value="今天啟用">今天啟用</option>
            <option value="隔天啟用">隔天啟用</option>
          </select>
        </div>

        <div class="field">
          <label>狀態</label>
          <select id="status">
            <option value="啟用">啟用</option>
            <option value="停用">停用</option>
          </select>
        </div>

        <div class="field full">
          <label>備註</label>
          <input id="note" placeholder="例如：現折不可找零" />
        </div>
      </div>

      <div class="button-row">
        <button class="btn btn-main" onclick="saveConfig()">✦ 建立券別 ✦</button>
        <button class="btn btn-sub" onclick="resetForm()">清空重填</button>
      </div>

      <div id="message" class="msg"></div>
    </div>

    <div class="section-card">
      <div class="list-title">已建立券別</div>

      <div id="simpleList" class="simple-list">
        <div class="simple-item">
          <div>讀取中...</div>
        </div>
      </div>

      <div id="detailCard" class="detail-card">
        <div class="detail-title">券別詳細資訊</div>
        <div id="detailInfo" class="detail-info"></div>

        <div class="qr-panel">
          <div class="qr-card">
            <canvas id="qrCanvas" width="210" height="210"></canvas>
          </div>
          <div class="qr-info" id="qrText">
            點擊下方列表中的券別後，會在此顯示 QR 與詳細資訊。
          </div>
        </div>

        <div class="mini-row">
          <button class="mini-btn mini-edit" onclick="downloadQr()">下載 QR</button>
          <button class="mini-btn mini-edit" onclick="editCurrent()">編輯此券</button>
          <button class="mini-btn mini-delete" onclick="deleteCurrent()">刪除此券</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyOw_QU9MFpN8CDrEzMoeWasyLwegokiZWhA39Rx3ks-c64WN_dkaJibjtafCDOTJzC/exec';
    const CLAIM_PAGE_BASE_URL = 'https://jia-xiang1.github.io/LINE-1/claim.html';

    let couponConfigs = [];
    let currentQrValue = '';
    let currentItem = null;

    function setMessage(text, isError = false) {
      const el = document.getElementById('message');
      el.textContent = text || '';
      el.className = 'msg ' + (isError ? 'err' : 'ok');
    }

    function getFormData() {
      const 活動名稱 = document.getElementById('活動名稱').value.trim();
      const 品項 = document.getElementById('品項').value.trim();
      const 分類 = document.getElementById('分類').value.trim();

      return {
        id: document.getElementById('configId').value.trim(),
        活動名稱,
        品項,
        分類,
        eventType: 活動名稱,
        couponName: 品項,
        category: 分類,
        發放方式: document.getElementById('發放方式').value,
        couponNameCode: document.getElementById('couponNameCode').value.trim(),
        啟用方式: document.getElementById('啟用方式').value,
        status: document.getElementById('status').value,
        note: document.getElementById('note').value.trim()
      };
    }

    function setFormData(item) {
      document.getElementById('configId').value = item.id || '';
      document.getElementById('活動名稱').value = item.活動名稱 || '';
      document.getElementById('品項').value = item.品項 || '';
      document.getElementById('分類').value = item.分類 || '';
      document.getElementById('發放方式').value = item.發放方式 || 'qr';
      document.getElementById('couponNameCode').value = item.couponNameCode || '';
      document.getElementById('啟用方式').value = item.啟用方式 || '今天啟用';
      document.getElementById('status').value = item.status || '啟用';
      document.getElementById('note').value = item.note || '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
      document.getElementById('configId').value = '';
      document.getElementById('活動名稱').value = '';
      document.getElementById('品項').value = '';
      document.getElementById('分類').value = '';
      document.getElementById('發放方式').value = 'qr';
      document.getElementById('couponNameCode').value = '';
      document.getElementById('啟用方式').value = '今天啟用';
      document.getElementById('status').value = '啟用';
      document.getElementById('note').value = '';
      setMessage('');
    }

    async function apiGet(action, params = {}) {
      const url = new URL(GAS_API_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null) url.searchParams.set(k, v);
      });
      const res = await fetch(url.toString());
      return await res.json();
    }

    async function apiPost(payload) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function saveConfig() {
      const data = getFormData();

      if (!data.活動名稱) return setMessage('請輸入活動名稱', true);
      if (!data.品項) return setMessage('請輸入品項', true);
      if (!data.分類) return setMessage('請輸入分類', true);
      if (!data.couponNameCode) return setMessage('請輸入券別代碼', true);

      setMessage('建立中...');

      try {
        const res = await apiPost({
          action: 'saveCouponConfig',
          ...data,
          claimPageBaseUrl: CLAIM_PAGE_BASE_URL
        });

        if (!res || !res.success) {
          setMessage((res && res.message) || '建立失敗', true);
          return;
        }

        setMessage('建立成功');
        resetForm();
        await loadConfigs();
      } catch (err) {
        setMessage('建立失敗：' + err.message, true);
      }
    }

    async function deleteConfig(id) {
      if (!confirm('確定要刪除此券別嗎？')) return;

      try {
        const res = await apiPost({
          action: 'deleteCouponConfig',
          configId: id
        });

        if (!res || !res.success) {
          setMessage((res && res.message) || '刪除失敗', true);
          return;
        }

        setMessage('刪除成功');
        document.getElementById('detailCard').style.display = 'none';
        currentItem = null;
        currentQrValue = '';
        await loadConfigs();
      } catch (err) {
        setMessage('刪除失敗：' + err.message, true);
      }
    }

    function editCurrent() {
      if (!currentItem) return;
      setFormData(currentItem);
    }

    function deleteCurrent() {
      if (!currentItem) return;
      deleteConfig(currentItem.id);
    }

    async function showDetail(id) {
      const item = couponConfigs.find(x => x.id === id);
      if (!item) return;

      currentItem = item;
      currentQrValue = item.claimUrl || '';

      const detailCard = document.getElementById('detailCard');
      const detailInfo = document.getElementById('detailInfo');
      const qrText = document.getElementById('qrText');

      detailInfo.innerHTML = `
        活動名稱：${escapeHtml(item.活動名稱 || '')}<br>
        品項：${escapeHtml(item.品項 || '')}<br>
        分類：${escapeHtml(item.分類 || '')}<br>
        券別代碼：${escapeHtml(item.couponNameCode || '')}<br>
        啟用方式：${escapeHtml(item.啟用方式 || '')}<br>
        發放方式：${escapeHtml(item.發放方式 || '')}<br>
        狀態：${escapeHtml(item.status || '')}<br>
        備註：${escapeHtml(item.note || '-')}
      `;

      qrText.innerHTML = `
        QR 已建立。<br>
        活動名稱：${escapeHtml(item.活動名稱 || '')}<br>
        品項：${escapeHtml(item.品項 || '')}<br>
        券別代碼：${escapeHtml(item.couponNameCode || '')}
      `;

      if (currentQrValue) {
        const canvas = document.getElementById('qrCanvas');
        await QRCode.toCanvas(canvas, currentQrValue, {
          width: 210,
          margin: 1
        });
      }

      detailCard.style.display = 'block';
      detailCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function downloadQr() {
      const canvas = document.getElementById('qrCanvas');
      if (!currentQrValue || !currentItem) return setMessage('請先點選券別', true);

      const link = document.createElement('a');
      const code = currentItem.couponNameCode || 'coupon';
      link.download = `${code}-qr.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function renderSimpleList() {
      const container = document.getElementById('simpleList');

      if (!couponConfigs.length) {
        container.innerHTML = `
          <div class="simple-item">
            <div>目前尚無資料</div>
          </div>
        `;
        return;
      }

      container.innerHTML = couponConfigs.map(item => `
        <div class="simple-item" onclick="showDetail('${escapeAttr(item.id)}')">
          <div>
            <div class="simple-head">活動名稱</div>
            <div class="simple-value">${escapeHtml(item.活動名稱 || '')}</div>
          </div>
          <div>
            <div class="simple-head">品項</div>
            <div class="simple-value">${escapeHtml(item.品項 || '')}</div>
          </div>
          <div>
            <div class="simple-head">分類</div>
            <div class="simple-value">${escapeHtml(item.分類 || '')}</div>
          </div>
        </div>
      `).join('');
    }

    async function loadConfigs() {
      try {
        const res = await apiGet('getCouponConfigs');
        couponConfigs = Array.isArray(res.data) ? res.data : [];
        renderSimpleList();
      } catch (err) {
        document.getElementById('simpleList').innerHTML = `
          <div class="simple-item">
            <div>讀取失敗：${escapeHtml(err.message)}</div>
          </div>
        `;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeAttr(str) {
      return String(str).replaceAll("'", "\\'");
    }

    loadConfigs();
  </script>
</body>
</html>
