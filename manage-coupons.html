<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>券別管理系統</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f6f0e4;
      --bg-card: rgba(255,255,255,0.55);
      --line: rgba(197, 82, 36, 0.12);
      --primary: #c63b1e;
      --primary-dark: #a52d16;
      --accent: #d89a1d;
      --text: #7a2f1d;
      --text-soft: #9a6d5f;
      --border: rgba(198, 59, 30, 0.10);
      --shadow: 0 10px 24px rgba(152, 73, 35, 0.08);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang TC","Noto Sans TC",Arial,sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.55), rgba(255,255,255,0) 30%),
        repeating-radial-gradient(circle at 50% -180px,
          transparent 0 120px,
          rgba(198,59,30,0.015) 120px 122px),
        var(--bg);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.45;
      background-image:
        url("data:image/svg+xml,%3Csvg width='160' height='64' viewBox='0 0 160 64' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 32C13.333 21.333 26.667 16 40 16s26.667 5.333 40 16 26.667 16 40 16 26.667-5.333 40-16' fill='none' stroke='%23d36b55' stroke-width='1.2' stroke-opacity='0.16'/%3E%3C/svg%3E");
      background-size: 160px 64px;
      background-repeat: repeat;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 54px;
      background: #0b0b0b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      letter-spacing: 1px;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 22px 16px 40px;
      position: relative;
      z-index: 1;
    }

    .hero {
      text-align: center;
      margin-bottom: 20px;
    }

    .badge-line {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--primary);
      font-size: 15px;
      margin-bottom: 8px;
    }

    .badge-line::before,
    .badge-line::after {
      content: "";
      width: 44px;
      height: 2px;
      border-radius: 999px;
      background: rgba(198, 59, 30, 0.5);
    }

    .hero-title {
      font-size: 34px;
      line-height: 1.2;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--text-soft);
      line-height: 1.7;
    }

    .section-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 28px;
      padding: 20px;
      backdrop-filter: blur(8px);
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 28px;
      font-weight: 900;
      color: var(--primary);
      text-align: center;
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
    }

    input, select, textarea {
      width: 100%;
      border: 1.5px solid rgba(168, 88, 55, 0.18);
      background: rgba(145, 108, 92, 0.08);
      color: var(--text);
      border-radius: 22px;
      padding: 15px 18px;
      font-size: 16px;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15);
    }

    input::placeholder, textarea::placeholder {
      color: rgba(122, 47, 29, 0.45);
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--text) 50%),
        linear-gradient(135deg, var(--text) 50%, transparent 50%);
      background-position:
        calc(100% - 24px) calc(50% - 4px),
        calc(100% - 17px) calc(50% - 4px);
      background-size: 7px 7px, 7px 7px;
      background-repeat: no-repeat;
      padding-right: 42px;
    }

    .read-only-box {
      width: 100%;
      min-height: 54px;
      display: flex;
      align-items: center;
      border-radius: 22px;
      padding: 15px 18px;
      font-size: 16px;
      background: rgba(145, 108, 92, 0.08);
      border: 1.5px solid rgba(168, 88, 55, 0.18);
      color: var(--text);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 18px;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      transition: transform .12s ease, opacity .12s ease;
    }

    .btn:active {
      transform: scale(0.985);
    }

    .btn-main {
      min-width: 240px;
      color: white;
      background: linear-gradient(180deg, #d53a20 0%, #c22e19 45%, #c12619 100%);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.12),
        0 10px 18px rgba(198,59,30,0.18);
    }

    .btn-sub {
      background: rgba(255,255,255,0.75);
      color: var(--primary);
      border: 1px solid rgba(198,59,30,0.12);
    }

    .msg {
      text-align: center;
      margin-top: 14px;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.7;
      min-height: 28px;
    }

    .ok { color: #2f855a; }
    .err { color: #c53030; }

    .qr-panel {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 18px;
      align-items: center;
    }

    .qr-card {
      background: white;
      border-radius: 30px;
      padding: 16px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 260px;
      min-height: 260px;
      margin: 0 auto;
    }

    #qrCanvas {
      width: 220px;
      height: 220px;
    }

    .qr-info {
      background: rgba(255,255,255,0.50);
      border-radius: 24px;
      border: 1px solid rgba(198,59,30,0.08);
      padding: 16px;
      color: var(--text-soft);
      line-height: 1.9;
      font-size: 14px;
      min-height: 120px;
    }

    .list-title {
      font-size: 24px;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 14px;
      text-align: center;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 13px 10px;
      border-bottom: 1px solid rgba(198,59,30,0.08);
      font-size: 14px;
      color: var(--text);
      vertical-align: top;
      background: transparent;
    }

    th {
      color: var(--primary);
      font-weight: 900;
    }

    .status-pill {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
    }

    .on {
      background: rgba(47,133,90,0.12);
      color: #2f855a;
    }

    .off {
      background: rgba(197,48,48,0.10);
      color: #c53030;
    }

    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-btn {
      border: 0;
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .mini-edit {
      background: rgba(255,255,255,0.90);
      color: var(--primary);
      border: 1px solid rgba(198,59,30,0.12);
    }

    .mini-delete {
      background: #c53030;
      color: white;
    }

    @media (max-width: 768px) {
      .wrap {
        padding: 18px 14px 36px;
      }

      .hero-title {
        font-size: 28px;
      }

      .section-title {
        font-size: 24px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .qr-panel {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">券別管理系統</div>

  <div class="wrap">
    <div class="hero">
      <div class="badge-line">建立領券 QR</div>
      <div class="hero-title">券別無誤！開始建立！</div>
      <div class="hero-sub">
        僅保留中文欄位，開始日只能選今天或明天，使用期限固定 30 天
      </div>
    </div>

    <div class="section-card">
      <div class="section-title">建立券別</div>

      <input type="hidden" id="configId" />

      <div class="grid">
        <div class="field">
          <label>活動名稱</label>
          <input id="活動名稱" placeholder="例如：光碗抽獎" />
        </div>

        <div class="field">
          <label>品項</label>
          <input id="品項" placeholder="例如：竹莢魚乙雙" />
        </div>

        <div class="field">
          <label>分類</label>
          <input id="分類" placeholder="例如：現金折價券 / 甜點 / 員工" />
        </div>

        <div class="field">
          <label>發放方式</label>
          <select id="發放方式">
            <option value="qr">qr</option>
            <option value="QR/NFC">QR/NFC</option>
            <option value="NFC">NFC</option>
          </select>
        </div>

        <div class="field">
          <label>券別代碼</label>
          <input id="couponNameCode" placeholder="例如：E01 / A02 / X00" />
        </div>

        <div class="field">
          <label>開始日</label>
          <select id="開始日" onchange="updateExpirePreview()"></select>
        </div>

        <div class="field">
          <label>使用期限</label>
          <div class="read-only-box">固定 30 天</div>
        </div>

        <div class="field">
          <label>自動截止日</label>
          <div class="read-only-box" id="截止日預覽">-</div>
        </div>

        <div class="field">
          <label>狀態</label>
          <select id="status">
            <option value="啟用">啟用</option>
            <option value="停用">停用</option>
          </select>
        </div>

        <div class="field full">
          <label>備註</label>
          <input id="note" placeholder="例如：現折不可找零" />
        </div>
      </div>

      <div class="button-row">
        <button class="btn btn-main" onclick="saveConfig()">✦ 建立 QR ✦</button>
        <button class="btn btn-sub" onclick="generateQr()">重新生成 QR</button>
        <button class="btn btn-sub" onclick="downloadQr()">下載 QR</button>
        <button class="btn btn-sub" onclick="resetForm()">清空重填</button>
      </div>

      <div id="message" class="msg"></div>

      <div class="qr-panel">
        <div class="qr-card">
          <canvas id="qrCanvas" width="220" height="220"></canvas>
        </div>
        <div class="qr-info" id="qrText">
          尚未生成 QR。<br>
          儲存券別後，系統會自動建立領券 QR。<br>
          本頁面不再顯示網址，只保留 QR 使用。
        </div>
      </div>
    </div>

    <div class="section-card">
      <div class="list-title">已建立券別</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>活動名稱</th>
              <th>品項</th>
              <th>分類</th>
              <th>券別代碼</th>
              <th>開始日</th>
              <th>截止日</th>
              <th>狀態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="8">讀取中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyFQEygXy8QlMDwQPpwY0ZJyTHHViOsDA9iEk80nZUDEqO9JcElRbDc3R6cFeT9n8iT/exec';
    const CLAIM_PAGE_BASE_URL = 'https://jia-xiang1.github.io/LINE-1/claim.html';

    let couponConfigs = [];
    let currentQrValue = '';

    function formatDateToSlash(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}/${m}/${d}`;
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function initStartDateOptions() {
      const select = document.getElementById('開始日');
      const today = new Date();
      const tomorrow = addDays(today, 1);

      const opts = [
        { value: formatDateToSlash(today), label: `今天 (${formatDateToSlash(today)})` },
        { value: formatDateToSlash(tomorrow), label: `明天 (${formatDateToSlash(tomorrow)})` }
      ];

      select.innerHTML = opts.map(o => `<option value="${o.value}">${o.label}</option>`).join('');
      updateExpirePreview();
    }

    function updateExpirePreview() {
      const startValue = document.getElementById('開始日').value;
      if (!startValue) {
        document.getElementById('截止日預覽').textContent = '-';
        return;
      }
      const startDate = new Date(startValue.replaceAll('/', '-'));
      const expireDate = addDays(startDate, 30);
      document.getElementById('截止日預覽').textContent = formatDateToSlash(expireDate);
    }

    function setMessage(text, isError = false) {
      const el = document.getElementById('message');
      el.textContent = text || '';
      el.className = 'msg ' + (isError ? 'err' : 'ok');
    }

    function getFormData() {
      const 活動名稱 = document.getElementById('活動名稱').value.trim();
      const 品項 = document.getElementById('品項').value.trim();
      const 分類 = document.getElementById('分類').value.trim();

      return {
        id: document.getElementById('configId').value.trim(),
        活動名稱,
        品項,
        分類,
        eventType: 活動名稱,
        couponName: 品項,
        category: 分類,
        發放方式: document.getElementById('發放方式').value,
        couponNameCode: document.getElementById('couponNameCode').value.trim(),
        開始日: document.getElementById('開始日').value,
        status: document.getElementById('status').value,
        note: document.getElementById('note').value.trim()
      };
    }

    function setFormData(item) {
      document.getElementById('configId').value = item.id || '';
      document.getElementById('活動名稱').value = item.活動名稱 || '';
      document.getElementById('品項').value = item.品項 || '';
      document.getElementById('分類').value = item.分類 || '';
      document.getElementById('發放方式').value = item.發放方式 || 'qr';
      document.getElementById('couponNameCode').value = item.couponNameCode || '';
      document.getElementById('開始日').value = item.開始日 || document.getElementById('開始日').value;
      document.getElementById('status').value = item.status || '啟用';
      document.getElementById('note').value = item.note || '';
      document.getElementById('截止日預覽').textContent = item.截止日 || '-';
      currentQrValue = item.claimUrl || '';
      document.getElementById('qrText').innerHTML = currentQrValue
        ? `QR 已建立。<br>活動名稱：${escapeHtml(item.活動名稱 || '')}<br>品項：${escapeHtml(item.品項 || '')}<br>券別代碼：${escapeHtml(item.couponNameCode || '')}`
        : '尚未生成 QR。';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
      document.getElementById('configId').value = '';
      document.getElementById('活動名稱').value = '';
      document.getElementById('品項').value = '';
      document.getElementById('分類').value = '';
      document.getElementById('發放方式').value = 'qr';
      document.getElementById('couponNameCode').value = '';
      document.getElementById('status').value = '啟用';
      document.getElementById('note').value = '';
      currentQrValue = '';

      const canvas = document.getElementById('qrCanvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      document.getElementById('qrText').innerHTML =
        '尚未生成 QR。<br>儲存券別後，系統會自動建立領券 QR。<br>本頁面不再顯示網址，只保留 QR 使用。';

      initStartDateOptions();
      setMessage('');
    }

    async function apiGet(action, params = {}) {
      const url = new URL(GAS_API_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null) url.searchParams.set(k, v);
      });
      const res = await fetch(url.toString());
      return await res.json();
    }

    async function apiPost(payload) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function saveConfig() {
      const data = getFormData();

      if (!data.活動名稱) return setMessage('請輸入活動名稱', true);
      if (!data.品項) return setMessage('請輸入品項', true);
      if (!data.分類) return setMessage('請輸入分類', true);
      if (!data.couponNameCode) return setMessage('請輸入券別代碼', true);
      if (!data.開始日) return setMessage('請選擇開始日', true);

      setMessage('建立中...');

      try {
        const res = await apiPost({
          action: 'saveCouponConfig',
          ...data,
          claimPageBaseUrl: CLAIM_PAGE_BASE_URL
        });

        if (!res || !res.success) {
          setMessage((res && res.message) || '建立失敗', true);
          return;
        }

        setMessage('建立成功');
        setFormData(res.data || {});
        await loadConfigs();
        await generateQr();
      } catch (err) {
        setMessage('建立失敗：' + err.message, true);
      }
    }

    async function deleteConfig(id) {
      if (!confirm('確定要刪除此券別嗎？')) return;

      try {
        const res = await apiPost({
          action: 'deleteCouponConfig',
          configId: id
        });

        if (!res || !res.success) {
          setMessage((res && res.message) || '刪除失敗', true);
          return;
        }

        setMessage('刪除成功');
        resetForm();
        await loadConfigs();
      } catch (err) {
        setMessage('刪除失敗：' + err.message, true);
      }
    }

    async function generateQr() {
      if (!currentQrValue) return setMessage('請先建立券別再生成 QR', true);

      const canvas = document.getElementById('qrCanvas');
      await QRCode.toCanvas(canvas, currentQrValue, {
        width: 220,
        margin: 1
      });

      setMessage('QR 已生成');
    }

    function downloadQr() {
      const canvas = document.getElementById('qrCanvas');
      if (!currentQrValue) return setMessage('請先生成 QR', true);

      const link = document.createElement('a');
      const code = document.getElementById('couponNameCode').value.trim() || 'coupon';
      link.download = `${code}-qr.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function editConfig(id) {
      const item = couponConfigs.find(x => x.id === id);
      if (!item) return;
      setFormData(item);
      generateQr();
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');

      if (!couponConfigs.length) {
        tbody.innerHTML = '<tr><td colspan="8">目前尚無資料</td></tr>';
        return;
      }

      tbody.innerHTML = couponConfigs.map(item => `
        <tr>
          <td>${escapeHtml(item.活動名稱 || '')}</td>
          <td>${escapeHtml(item.品項 || '')}</td>
          <td>${escapeHtml(item.分類 || '')}</td>
          <td>${escapeHtml(item.couponNameCode || '')}</td>
          <td>${escapeHtml(item.開始日 || '')}</td>
          <td>${escapeHtml(item.截止日 || '')}</td>
          <td>
            <span class="status-pill ${item.status === '啟用' ? 'on' : 'off'}">
              ${escapeHtml(item.status || '')}
            </span>
          </td>
          <td>
            <div class="row-actions">
              <button class="mini-btn mini-edit" onclick="editConfig('${escapeAttr(item.id)}')">編輯</button>
              <button class="mini-btn mini-delete" onclick="deleteConfig('${escapeAttr(item.id)}')">刪除</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function loadConfigs() {
      try {
        const res = await apiGet('getCouponConfigs');
        couponConfigs = Array.isArray(res.data) ? res.data : [];
        renderTable();
      } catch (err) {
        document.getElementById('tableBody').innerHTML =
          `<tr><td colspan="8">讀取失敗：${escapeHtml(err.message)}</td></tr>`;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeAttr(str) {
      return String(str).replaceAll("'", "\\'");
    }

    initStartDateOptions();
    loadConfigs();
  </script>
</body>
</html>
