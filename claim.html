<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>領取優惠券</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang TC","Noto Sans TC",Arial,sans-serif;
      background:
        radial-gradient(circle at top, #3b1f0f 0%, #1a0f08 35%, #0e0a08 70%, #080808 100%);
      color: #fff7ed;
    }

    .wrap {
      max-width: 580px;
      margin: 0 auto;
      padding: 22px 16px 40px;
    }

    .hero {
      text-align: center;
      margin-bottom: 18px;
    }

    .title {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 8px;
      color: #ffd39d;
      text-shadow: 0 0 20px rgba(255,179,71,0.28);
      letter-spacing: 1px;
    }

    .sub {
      color: #fcd9b6;
      font-size: 14px;
      line-height: 1.7;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,214,153,0.18);
      box-shadow: 0 0 24px rgba(255,166,77,0.10);
      backdrop-filter: blur(8px);
      border-radius: 26px;
      padding: 18px;
    }

    .coupon-box {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,214,153,0.12);
    }

    .label {
      color: #ffc98e;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .value {
      font-size: 19px;
      font-weight: 900;
      line-height: 1.5;
      margin-bottom: 12px;
      word-break: break-word;
      color: #fff5e7;
    }

    .user-box {
      background: rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 14px;
      line-height: 1.9;
      font-size: 14px;
      margin-bottom: 12px;
      word-break: break-word;
      color: #ffe8c9;
    }

    .status-box {
      text-align: center;
      margin: 12px 0;
      font-weight: 800;
      font-size: 15px;
      line-height: 1.7;
      min-height: 28px;
    }

    .ok { color: #86efac; }
    .err { color: #fca5a5; }

    .notice-box {
      background: rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 14px;
      line-height: 1.85;
      font-size: 14px;
      margin-top: 12px;
      color: #ffe8c9;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 10px;
      transition: transform .15s ease, opacity .15s ease;
    }

    .btn:active {
      transform: scale(0.99);
    }

    .btn-main {
      background: linear-gradient(180deg, #ffba52, #ff8c1a);
      color: #2a1300;
      box-shadow: 0 10px 20px rgba(255,140,26,0.18);
    }

    .btn-sub {
      background: rgba(255,255,255,0.12);
      color: #fff5e7;
      border: 1px solid rgba(255,214,153,0.18);
    }

    .btn[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .success-box {
      display: none;
      margin-top: 14px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.30);
      border-radius: 18px;
      padding: 14px;
      line-height: 1.9;
      color: #d1fae5;
      word-break: break-word;
    }

    .success-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    @media (max-width: 640px) {
      .title {
        font-size: 28px;
      }

      .value {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="title">領取優惠券</div>
      <div class="sub">請確認券別資訊後進行領取</div>
    </div>

    <div class="card">
      <div class="coupon-box">
        <div class="label">活動名稱</div>
        <div id="活動名稱" class="value">讀取中...</div>

        <div class="label">品項</div>
        <div id="品項" class="value">讀取中...</div>

        <div class="label">分類</div>
        <div id="分類" class="value">讀取中...</div>

        <div class="label">券別名稱</div>
        <div id="couponName" class="value">讀取中...</div>

        <div class="label">活動期間</div>
        <div id="period" class="value">讀取中...</div>
      </div>

      <div class="user-box">
        LINE 名稱：<span id="displayName">讀取中...</span><br>
        LINE userId：<span id="userId">讀取中...</span>
      </div>

      <div id="message" class="status-box"></div>

      <button id="claimBtn" class="btn btn-main" onclick="claimCoupon()">立即領取</button>
      <button class="btn btn-sub" onclick="goCouponList()">前往我的優惠券</button>

      <div class="notice-box">
        領取後將自動建立你的專屬優惠券。<br>
        啟用日依系統規則顯示於卷包頁，實際可使用狀態以卷包頁為準。
      </div>

      <div id="successBox" class="success-box">
        <div class="success-title">領取成功</div>
        <div id="successDetail"></div>
      </div>
    </div>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyFQEygXy8QlMDwQPpwY0ZJyTHHViOsDA9iEk80nZUDEqO9JcElRbDc3R6cFeT9n8iT/exec';
    const LIFF_ID = '2009551865-EGhyWa2w';
    const COUPON_LIST_URL = 'https://jia-xiang1.github.io/LINE-1/coupon-list.html';

    let profileData = { userId: '', displayName: '' };
    let currentConfig = null;

    function getQueryParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || '';
    }

    function setMessage(text, isError = false) {
      const el = document.getElementById('message');
      el.textContent = text || '';
      el.className = 'status-box ' + (isError ? 'err' : 'ok');
    }

    async function apiGet(action, params = {}) {
      const url = new URL(GAS_API_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null) url.searchParams.set(k, v);
      });
      const res = await fetch(url.toString());
      return await res.json();
    }

    async function apiPost(payload) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        const profile = await liff.getProfile();
        profileData.userId = profile.userId || '';
        profileData.displayName = profile.displayName || '';

        document.getElementById('displayName').textContent = profileData.displayName || '-';
        document.getElementById('userId').textContent = profileData.userId || '-';
      } catch (err) {
        setMessage('LIFF 初始化失敗：' + err.message, true);
        document.getElementById('claimBtn').disabled = true;
      }
    }

    async function loadConfig() {
      const configId = getQueryParam('configId');
      if (!configId) {
        setMessage('缺少 configId', true);
        document.getElementById('claimBtn').disabled = true;
        return;
      }

      try {
        const res = await apiGet('getClaimConfig', { configId });

        if (!res || !res.success || !res.data) {
          setMessage((res && res.message) || '找不到券別', true);
          document.getElementById('claimBtn').disabled = true;
          return;
        }

        currentConfig = res.data;

        document.getElementById('活動名稱').textContent = currentConfig.活動名稱 || '-';
        document.getElementById('品項').textContent = currentConfig.品項 || '-';
        document.getElementById('分類').textContent = currentConfig.分類 || '-';
        document.getElementById('couponName').textContent = currentConfig.couponName || '-';
        document.getElementById('period').textContent =
          `${currentConfig.開始日 || '-'} ～ ${currentConfig.截止日 || '-'}`;

        if (!res.claimable) {
          setMessage(res.message || '目前不可領取', true);
          document.getElementById('claimBtn').disabled = true;
        } else {
          setMessage('目前可領取');
        }
      } catch (err) {
        setMessage('讀取失敗：' + err.message, true);
        document.getElementById('claimBtn').disabled = true;
      }
    }

    async function claimCoupon() {
      if (!currentConfig || !currentConfig.id) {
        setMessage('缺少券別資料', true);
        return;
      }

      if (!profileData.userId) {
        setMessage('尚未取得使用者資訊', true);
        return;
      }

      const btn = document.getElementById('claimBtn');
      btn.disabled = true;
      setMessage('領取中...');

      try {
        const res = await apiPost({
          action: 'claimCoupon',
          configId: currentConfig.id,
          userId: profileData.userId,
          name: profileData.displayName
        });

        if (!res || !res.success) {
          setMessage((res && res.message) || '領取失敗', true);
          btn.disabled = false;
          return;
        }

        setMessage('領取成功');

        const successBox = document.getElementById('successBox');
        const successDetail = document.getElementById('successDetail');

        successBox.style.display = 'block';
        successDetail.innerHTML = `
          券名稱：${escapeHtml(res.data.couponName || '')}<br>
          券別分類：${escapeHtml(res.data.category || '')}<br>
          領取時間：${escapeHtml(res.data.claimAt || '')}<br>
          啟用日：${escapeHtml(res.data.activateAt || '')}<br>
          到期日：${escapeHtml(res.data.expireAt || '')}<br>
          券號：${escapeHtml(res.data.couponId || '')}
        `;
      } catch (err) {
        setMessage('領取失敗：' + err.message, true);
        btn.disabled = false;
      }
    }

    function goCouponList() {
      window.location.href = COUPON_LIST_URL;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function initPage() {
      await initLiff();
      await loadConfig();
    }

    initPage();
  </script>
</body>
</html>
