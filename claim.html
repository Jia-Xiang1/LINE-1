<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>領券頁</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      background: linear-gradient(180deg, #f9fafb 0%, #eef2f7 100%);
      color: #111827;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 22px 16px 40px;
    }
    .card {
      background: rgba(255,255,255,0.97);
      border-radius: 24px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      padding: 22px 18px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
    }
    .sub {
      text-align: center;
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 18px;
      line-height: 1.6;
    }
    .coupon-box {
      background: linear-gradient(135deg, #fff7ed 0%, #fffbeb 100%);
      border: 1px solid #fed7aa;
      border-radius: 18px;
      padding: 18px;
    }
    .label {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 4px;
      font-weight: 700;
    }
    .value {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .period {
      font-size: 15px;
      font-weight: 700;
      color: #92400e;
      line-height: 1.6;
    }
    .msg {
      margin-top: 14px;
      text-align: center;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.6;
    }
    .ok { color: #15803d; }
    .err { color: #dc2626; }
    .user-box {
      background: #f9fafb;
      border-radius: 16px;
      padding: 14px;
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.8;
      word-break: break-word;
    }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 14px;
    }
    .btn-primary {
      background: #111827;
      color: white;
    }
    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    .success-box {
      display: none;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      border-radius: 18px;
      padding: 16px;
      margin-top: 16px;
    }
    .success-title {
      color: #065f46;
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 10px;
    }
    .success-line {
      font-size: 14px;
      line-height: 1.9;
      color: #065f46;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">領取優惠券</div>
      <div class="sub">請確認券別資訊後點擊領取</div>

      <div class="coupon-box">
        <div class="label">活動名稱</div>
        <div id="eventType" class="value">讀取中...</div>

        <div class="label">類別</div>
        <div id="couponCategory" class="value">讀取中...</div>

        <div class="label">品項</div>
        <div id="couponName" class="value">讀取中...</div>

        <div class="label">可領取期間</div>
        <div id="couponPeriod" class="period">讀取中...</div>
      </div>

      <div class="user-box">
        <div>LINE 名稱：<span id="displayName">讀取中...</span></div>
        <div>LINE userId：<span id="userId">讀取中...</span></div>
      </div>

      <div id="claimMessage" class="msg"></div>

      <button id="claimBtn" class="btn btn-primary" onclick="submitClaim()">立即領取</button>
      <button class="btn btn-secondary" onclick="goCouponList()">前往我的優惠券</button>

      <div id="successBox" class="success-box">
        <div class="success-title">領取成功</div>
        <div id="successDetail" class="success-line"></div>
      </div>
    </div>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwPwgRIkApg2TFdWYB6mPRZwN57txobZQvXXlQhk6K2AywumCs0PNqsltw70TsTAhW1/exec';
    const LIFF_ID = '2009551865-EGhyWa2w';
    const COUPON_LIST_URL = `${location.origin}${location.pathname.replace('claim.html', 'coupon-list.html')}`;

    let profileData = { userId: '', displayName: '' };
    let claimConfig = null;

    function getQueryParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || '';
    }

    function setMessage(text, isError = false) {
      const el = document.getElementById('claimMessage');
      el.textContent = text || '';
      el.className = 'msg ' + (isError ? 'err' : 'ok');
    }

    function disableClaimButton(disabled) {
      const btn = document.getElementById('claimBtn');
      btn.disabled = !!disabled;
    }

    async function apiGet(action, params = {}) {
      const url = new URL(GAS_API_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null) url.searchParams.set(k, v);
      });

      const res = await fetch(url.toString());
      return await res.json();
    }

    async function apiPost(payload) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        const profile = await liff.getProfile();
        profileData.userId = profile.userId || '';
        profileData.displayName = profile.displayName || '';

        document.getElementById('displayName').textContent = profileData.displayName || '-';
        document.getElementById('userId').textContent = profileData.userId || '-';
      } catch (err) {
        document.getElementById('displayName').textContent = '讀取失敗';
        document.getElementById('userId').textContent = '讀取失敗';
        setMessage('LIFF 初始化失敗：' + err.message, true);
        disableClaimButton(true);
      }
    }

    async function loadClaimConfig() {
      const configId = getQueryParam('configId');

      if (!configId) {
        setMessage('缺少券別參數', true);
        disableClaimButton(true);
        return;
      }

      try {
        const res = await apiGet('getClaimConfig', { configId });

        if (!res || !res.success || !res.data) {
          setMessage((res && res.message) || '找不到券別資料', true);
          disableClaimButton(true);
          return;
        }

        claimConfig = res.data;

        document.getElementById('eventType').textContent = claimConfig.eventName || '-';
        document.getElementById('couponCategory').textContent = claimConfig.category || '-';
        document.getElementById('couponName').textContent = claimConfig.itemName || '-';
        document.getElementById('couponPeriod').textContent =
          `${claimConfig.startDate || '-'} ～ ${claimConfig.endDate || '-'}`;

        if (!res.claimable) {
          setMessage(res.message || '目前不可領取', true);
          disableClaimButton(true);
        } else {
          setMessage('目前可領取', false);
          disableClaimButton(false);
        }
      } catch (err) {
        setMessage('讀取券別失敗：' + err.message, true);
        disableClaimButton(true);
      }
    }

    async function submitClaim() {
      if (!claimConfig || !claimConfig.id) {
        setMessage('缺少券別資料', true);
        return;
      }

      if (!profileData.userId) {
        setMessage('尚未取得 LINE 使用者資料', true);
        return;
      }

      disableClaimButton(true);
      setMessage('領取中...');

      try {
        const res = await apiPost({
          action: 'claimCoupon',
          configId: claimConfig.id,
          userId: profileData.userId,
          displayName: profileData.displayName
        });

        if (!res || !res.success) {
          setMessage((res && res.message) || '領取失敗', true);
          disableClaimButton(false);
          return;
        }

        setMessage('領取成功');
        document.getElementById('successBox').style.display = 'block';
        document.getElementById('successDetail').innerHTML = `
          活動名稱：${escapeHtml(res.data.eventName || '')}<br>
          類別：${escapeHtml(res.data.category || '')}<br>
          品項：${escapeHtml(res.data.itemName || '')}<br>
          領取日：${escapeHtml(res.data.claimDate || '')}<br>
          啟用日：${escapeHtml(res.data.activeDate || '')}<br>
          截止日：${escapeHtml(res.data.expireDate || '')}
        `;
      } catch (err) {
        setMessage('領取失敗：' + err.message, true);
        disableClaimButton(false);
      }
    }

    function goCouponList() {
      window.location.href = COUPON_LIST_URL;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function initPage() {
      await initLiff();
      await loadClaimConfig();
    }

    initPage();
  </script>
</body>
</html>
