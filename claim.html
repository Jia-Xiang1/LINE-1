<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>領取優惠券</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang TC","Noto Sans TC",Arial,sans-serif;
      background:
        radial-gradient(circle at top, #311508 0%, #17100c 40%, #0b0b0b 100%);
      color: #fff4e5;
      min-height: 100vh;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,214,153,0.18);
      border-radius: 26px;
      box-shadow: 0 0 28px rgba(255,166,77,0.10);
      padding: 20px;
    }
    .title {
      font-size: 30px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 6px;
      color: #ffd39d;
    }
    .sub {
      text-align: center;
      color: #fcd9b6;
      font-size: 14px;
      margin-bottom: 18px;
    }
    .coupon-box {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .label {
      color: #ffc98e;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .value {
      font-size: 19px;
      font-weight: 900;
      line-height: 1.5;
      margin-bottom: 12px;
      word-break: break-word;
    }
    .msg {
      text-align: center;
      margin: 12px 0;
      font-weight: 800;
    }
    .ok { color: #86efac; }
    .err { color: #fca5a5; }
    .user-box {
      background: rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 14px;
      line-height: 1.8;
      font-size: 14px;
      margin-bottom: 12px;
      word-break: break-word;
    }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-main {
      background: linear-gradient(180deg, #ffba52, #ff8c1a);
      color: #2a1300;
    }
    .btn-sub {
      background: rgba(255,255,255,0.12);
      color: #fff5e7;
    }
    .success-box {
      display: none;
      margin-top: 14px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.30);
      border-radius: 18px;
      padding: 14px;
      line-height: 1.8;
      color: #d1fae5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">領取優惠券</div>
      <div class="sub">請確認券別資訊後進行領取</div>

      <div class="coupon-box">
        <div class="label">活動名稱</div>
        <div id="活動名稱" class="value">讀取中...</div>

        <div class="label">品項</div>
        <div id="品項" class="value">讀取中...</div>

        <div class="label">分類</div>
        <div id="分類" class="value">讀取中...</div>

        <div class="label">券別名稱</div>
        <div id="couponName" class="value">讀取中...</div>

        <div class="label">有效期間</div>
        <div id="period" class="value">讀取中...</div>
      </div>

      <div class="user-box">
        LINE 名稱：<span id="displayName">讀取中...</span><br>
        LINE userId：<span id="userId">讀取中...</span>
      </div>

      <div id="message" class="msg"></div>

      <button id="claimBtn" class="btn btn-main" onclick="claimCoupon()">立即領取</button>
      <button class="btn btn-sub" onclick="goCouponList()">前往我的優惠券</button>

      <div id="successBox" class="success-box"></div>
    </div>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzoMJy0JJGJ46tXEn9U4cjggpIZ6UugAy6tiZs67NwaWibb0i0wuh73O6aer_TCCTKo/exec';
    const LIFF_ID = '2009551865-EGhyWa2w';
    const COUPON_LIST_URL = 'https://jia-xiang1.github.io/LINE-1/coupon-list.html';

    let profileData = { userId: '', displayName: '' };
    let currentConfig = null;

    function getQueryParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || '';
    }

    function setMessage(text, isError = false) {
      const el = document.getElementById('message');
      el.textContent = text || '';
      el.className = 'msg ' + (isError ? 'err' : 'ok');
    }

    async function apiGet(action, params = {}) {
      const url = new URL(GAS_API_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null) url.searchParams.set(k, v);
      });
      const res = await fetch(url.toString());
      return await res.json();
    }

    async function apiPost(payload) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        const profile = await liff.getProfile();
        profileData.userId = profile.userId || '';
        profileData.displayName = profile.displayName || '';
        document.getElementById('displayName').textContent = profileData.displayName || '-';
        document.getElementById('userId').textContent = profileData.userId || '-';
      } catch (err) {
        setMessage('LIFF 初始化失敗：' + err.message, true);
        document.getElementById('claimBtn').disabled = true;
      }
    }

    async function loadConfig() {
      const configId = getQueryParam('configId');
      if (!configId) {
        setMessage('缺少 configId', true);
        return;
      }

      try {
        const res = await apiGet('getClaimConfig', { configId });
        if (!res || !res.success || !res.data) {
          setMessage((res && res.message) || '找不到券別', true);
          return;
        }

        currentConfig = res.data;
        document.getElementById('活動名稱').textContent = currentConfig.活動名稱 || '-';
        document.getElementById('品項').textContent = currentConfig.品項 || '-';
        document.getElementById('分類').textContent = currentConfig.分類 || '-';
        document.getElementById('couponName').textContent = currentConfig.couponName || '-';
        document.getElementById('period').textContent = `${currentConfig.開始日 || '-'} ～ ${currentConfig.截止日 || '-'}`;

        if (!res.claimable) {
          setMessage(res.message || '目前不可領取', true);
          document.getElementById('claimBtn').disabled = true;
        } else {
          setMessage('目前可領取');
        }
      } catch (err) {
        setMessage('讀取失敗：' + err.message, true);
      }
    }

    async function claimCoupon() {
      if (!currentConfig || !currentConfig.id) return setMessage('缺少券別資料', true);
      if (!profileData.userId) return setMessage('尚未取得使用者資訊', true);

      setMessage('領取中...');

      try {
        const res = await apiPost({
          action: 'claimCoupon',
          configId: currentConfig.id,
          userId: profileData.userId,
          name: profileData.displayName
        });

        if (!res || !res.success) {
          setMessage((res && res.message) || '領取失敗', true);
          return;
        }

        setMessage('領取成功');
        document.getElementById('successBox').style.display = 'block';
        document.getElementById('successBox').innerHTML = `
          領取成功<br>
          券名稱：${escapeHtml(res.data.couponName || '')}<br>
          類別：${escapeHtml(res.data.category || '')}<br>
          啟用日：${escapeHtml(res.data.activateAt || '')}<br>
          到期日：${escapeHtml(res.data.expireAt || '')}<br>
          券號：${escapeHtml(res.data.couponId || '')}
        `;
      } catch (err) {
        setMessage('領取失敗：' + err.message, true);
      }
    }

    function goCouponList() {
      window.location.href = COUPON_LIST_URL;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function initPage() {
      await initLiff();
      await loadConfig();
    }

    initPage();
  </script>
</body>
</html>
