<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>領取優惠券</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f6f0e4;
      --bg-card: rgba(255,255,255,0.56);
      --primary: #c63b1e;
      --text: #7a2f1d;
      --text-soft: #9a6d5f;
      --border: rgba(198, 59, 30, 0.10);
      --shadow: 0 10px 24px rgba(152, 73, 35, 0.08);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang TC","Noto Sans TC",Arial,sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.55), rgba(255,255,255,0) 30%),
        repeating-radial-gradient(circle at 50% -180px,
          transparent 0 120px,
          rgba(198,59,30,0.015) 120px 122px),
        var(--bg);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.45;
      background-image:
        url("data:image/svg+xml,%3Csvg width='160' height='64' viewBox='0 0 160 64' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 32C13.333 21.333 26.667 16 40 16s26.667 5.333 40 16 26.667 16 40 16 26.667-5.333 40-16' fill='none' stroke='%23d36b55' stroke-width='1.2' stroke-opacity='0.16'/%3E%3C/svg%3E");
      background-size: 160px 64px;
      background-repeat: repeat;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 54px;
      background: #0b0b0b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      letter-spacing: 1px;
    }

    .wrap {
      max-width: 620px;
      margin: 0 auto;
      padding: 22px 16px 40px;
      position: relative;
      z-index: 1;
    }

    .hero {
      text-align: center;
      margin-bottom: 20px;
    }

    .badge-line {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--primary);
      font-size: 15px;
      margin-bottom: 8px;
    }

    .badge-line::before,
    .badge-line::after {
      content: "";
      width: 44px;
      height: 2px;
      border-radius: 999px;
      background: rgba(198, 59, 30, 0.5);
    }

    .hero-title {
      font-size: 34px;
      line-height: 1.2;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--text-soft);
      line-height: 1.7;
    }

    .section-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 28px;
      padding: 20px;
      backdrop-filter: blur(8px);
    }

    .coupon-panel {
      background: rgba(255,255,255,0.42);
      border: 1px solid rgba(198,59,30,0.08);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .label {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-soft);
      margin-bottom: 4px;
    }

    .value {
      font-size: 22px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1.45;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .user-box,
    .notice-box,
    .success-box {
      background: rgba(255,255,255,0.42);
      border: 1px solid rgba(198,59,30,0.08);
      border-radius: 22px;
      padding: 14px;
      line-height: 1.85;
      font-size: 14px;
      margin-top: 12px;
      color: var(--text);
      word-break: break-word;
    }

    .success-box {
      display: none;
      background: rgba(255,255,255,0.62);
    }

    .success-title {
      font-size: 18px;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .status-box {
      text-align: center;
      margin: 12px 0;
      font-weight: 800;
      font-size: 15px;
      line-height: 1.7;
      min-height: 28px;
    }

    .ok { color: #2f855a; }
    .err { color: #c53030; }

    .button-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 15px 22px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      transition: transform .12s ease, opacity .12s ease;
    }

    .btn:active {
      transform: scale(0.985);
    }

    .btn-main {
      color: white;
      background: linear-gradient(180deg, #d53a20 0%, #c22e19 45%, #c12619 100%);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.12),
        0 10px 18px rgba(198,59,30,0.18);
    }

    .btn-sub {
      background: rgba(255,255,255,0.78);
      color: var(--primary);
      border: 1px solid rgba(198,59,30,0.12);
    }

    .btn[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    @media (max-width: 640px) {
      .hero-title {
        font-size: 28px;
      }

      .value {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">領取優惠券</div>

  <div class="wrap">
    <div class="hero">
      <div class="badge-line">確認券別資訊</div>
      <div class="hero-title">券別無誤！立即領取！</div>
      <div class="hero-sub">領取後將依券別設定自動計算啟用日與到期日</div>
    </div>

    <div class="section-card">
      <div class="coupon-panel">
        <div class="label">活動名稱</div>
        <div id="活動名稱" class="value">讀取中...</div>

        <div class="label">品項</div>
        <div id="品項" class="value">讀取中...</div>

        <div class="label">分類</div>
        <div id="分類" class="value">讀取中...</div>

        <div class="label">啟用方式</div>
        <div id="啟用方式" class="value">讀取中...</div>
      </div>

      <div class="user-box">
        LINE 名稱：<span id="displayName">讀取中...</span><br>
        LINE userId：<span id="userId">讀取中...</span>
      </div>

      <div id="message" class="status-box"></div>

      <div class="button-row">
        <button id="claimBtn" class="btn btn-main" onclick="claimCoupon()">✦ 立即領取 ✦</button>
        <button class="btn btn-sub" onclick="goCouponList()">前往我的優惠券</button>
      </div>

      <div class="notice-box">
        若本券設定為「今天啟用」，則領取當天即可使用。<br>
        若設定為「隔天啟用」，則需隔日才可使用。<br>
        到期日會依啟用日起自動往後計算 30 天。
      </div>

      <div id="successBox" class="success-box">
        <div class="success-title">領取成功</div>
        <div id="successDetail"></div>
      </div>
    </div>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyOw_QU9MFpN8CDrEzMoeWasyLwegokiZWhA39Rx3ks-c64WN_dkaJibjtafCDOTJzC/exec';
    const LIFF_ID = '2009551865-EGhyWa2w';
    const COUPON_LIST_URL = 'https://jia-xiang1.github.io/LINE-1/coupon-list.html';

    let profileData = { userId: '', displayName: '' };
    let currentConfig = null;

    function getQueryParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || '';
    }

    function setMessage(text, isError = false) {
      const el = document.getElementById('message');
      el.textContent = text || '';
      el.className = 'status-box ' + (isError ? 'err' : 'ok');
    }

    function formatClaimDate(value) {
      if (!value || value === '-') return '-';
      const d = new Date(value);
      if (isNaN(d.getTime())) {
        return String(value).split(' ')[0] || String(value);
      }
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}/${m}/${day}`;
    }

    async function apiGet(action, params = {}) {
      const url = new URL(GAS_API_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null) url.searchParams.set(k, v);
      });
      const res = await fetch(url.toString());
      return await res.json();
    }

    async function apiPost(payload) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        const profile = await liff.getProfile();
        profileData.userId = profile.userId || '';
        profileData.displayName = profile.displayName || '';

        document.getElementById('displayName').textContent = profileData.displayName || '-';
        document.getElementById('userId').textContent = profileData.userId || '-';
      } catch (err) {
        setMessage('LIFF 初始化失敗：' + err.message, true);
        document.getElementById('claimBtn').disabled = true;
      }
    }

    async function loadConfig() {
      const configId = getQueryParam('configId');
      if (!configId) {
        setMessage('缺少 configId', true);
        document.getElementById('claimBtn').disabled = true;
        return;
      }

      try {
        const res = await apiGet('getClaimConfig', { configId });

        if (!res || !res.success || !res.data) {
          setMessage((res && res.message) || '找不到券別', true);
          document.getElementById('claimBtn').disabled = true;
          return;
        }

        currentConfig = res.data;

        document.getElementById('活動名稱').textContent = currentConfig.活動名稱 || '-';
        document.getElementById('品項').textContent = currentConfig.品項 || '-';
        document.getElementById('分類').textContent = currentConfig.分類 || '-';
        document.getElementById('啟用方式').textContent = currentConfig.啟用方式 || '今天啟用';

        if (!res.claimable) {
          setMessage(res.message || '目前不可領取', true);
          document.getElementById('claimBtn').disabled = true;
        } else {
          setMessage('目前可領取');
        }
      } catch (err) {
        setMessage('讀取失敗：' + err.message, true);
        document.getElementById('claimBtn').disabled = true;
      }
    }

    async function claimCoupon() {
      if (!currentConfig || !currentConfig.id) {
        setMessage('缺少券別資料', true);
        return;
      }

      if (!profileData.userId) {
        setMessage('尚未取得使用者資訊', true);
        return;
      }

      const btn = document.getElementById('claimBtn');
      btn.disabled = true;
      setMessage('領取中...');

      try {
        const res = await apiPost({
          action: 'claimCoupon',
          configId: currentConfig.id,
          userId: profileData.userId,
          name: profileData.displayName
        });

        if (!res || !res.success) {
          setMessage((res && res.message) || '領取失敗', true);
          btn.disabled = false;
          return;
        }

        setMessage('領取成功');

        const successBox = document.getElementById('successBox');
        const successDetail = document.getElementById('successDetail');

        successBox.style.display = 'block';
        successDetail.innerHTML = `
          活動名稱：${escapeHtml(res.data.活動類別 || '')}<br>
          品項：${escapeHtml(res.data.品項 || '')}<br>
          分類：${escapeHtml(res.data.分類 || '')}<br>
          線上領取日期：${escapeHtml(formatClaimDate(res.data.claimAt || ''))}<br>
          啟用日：${escapeHtml(res.data.activateAt || '')}<br>
          到期日：${escapeHtml(res.data.expireAt || '')}<br>
          券號：${escapeHtml(res.data.couponId || '')}
        `;
      } catch (err) {
        setMessage('領取失敗：' + err.message, true);
        btn.disabled = false;
      }
    }

    function goCouponList() {
      window.location.href = COUPON_LIST_URL;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function initPage() {
      await initLiff();
      await loadConfig();
    }

    initPage();
  </script>
</body>
</html>
