<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>活動優惠券領取</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", sans-serif;
      background: radial-gradient(circle at top, #fff8f0 0%, #f8f1e7 30%, #f3ede5 100%);
      color: #2d1500;
      min-height: 100vh;
      padding: 18px 14px 28px;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .top-deco {
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #c9341a 0%, #d7a423 50%, #c9341a 100%);
      margin-bottom: 18px;
      box-shadow: 0 2px 8px rgba(201, 52, 26, 0.18);
    }

    .card {
      background: rgba(255, 255, 255, 0.94);
      border-radius: 26px;
      padding: 22px 18px 18px;
      box-shadow: 0 10px 30px rgba(86, 45, 10, 0.08), 0 2px 10px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(201, 52, 26, 0.08);
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, #c9341a 0%, #d7a423 50%, #c9341a 100%);
    }

    .brand {
      text-align: center;
      margin-bottom: 18px;
    }

    .brand-small {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.24em;
      color: rgba(201, 52, 26, 0.76);
      margin-bottom: 8px;
      font-weight: 800;
    }

    .title {
      font-size: 30px;
      font-weight: 900;
      color: #c9341a;
      margin-bottom: 8px;
      line-height: 1.2;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #6f6259;
      font-size: 14px;
      line-height: 1.8;
      margin-bottom: 18px;
    }

    .hero-box {
      position: relative;
      background: linear-gradient(180deg, #fffaf3 0%, #fff6ec 100%);
      border: 1.5px dashed rgba(201, 52, 26, 0.42);
      border-radius: 22px;
      padding: 18px 16px;
      margin-bottom: 16px;
    }

    .hero-box::before,
    .hero-box::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 18px;
      height: 18px;
      background: #f3ede5;
      border-radius: 999px;
      transform: translateY(-50%);
      box-shadow: inset 0 0 0 1px rgba(201, 52, 26, 0.08);
    }

    .hero-box::before { left: -9px; }
    .hero-box::after { right: -9px; }

    .event-chip {
      display: inline-block;
      font-size: 12px;
      font-weight: 800;
      padding: 7px 12px;
      border-radius: 999px;
      background: #fff0e7;
      color: #8b1a0a;
      margin-bottom: 10px;
      border: 1px solid rgba(201, 52, 26, 0.1);
    }

    .event-name {
      font-size: 15px;
      font-weight: 800;
      color: #8b1a0a;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .prize-label {
      font-size: 13px;
      font-weight: 800;
      color: #8b1a0a;
      margin-bottom: 4px;
    }

    .prize-name {
      font-size: 30px;
      font-weight: 900;
      color: #c9341a;
      line-height: 1.3;
      margin-bottom: 12px;
      text-shadow: 0 1px 0 rgba(255,255,255,0.8);
      word-break: break-word;
    }

    .meta {
      font-size: 14px;
      color: #51463f;
      line-height: 2;
    }

    .meta strong {
      color: #8b1a0a;
      font-weight: 800;
    }

    .rule-box {
      margin: 14px 0 8px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid rgba(201, 52, 26, 0.08);
      padding: 14px 14px 10px;
    }

    .rule-title {
      font-size: 13px;
      font-weight: 800;
      color: #8b1a0a;
      margin-bottom: 8px;
    }

    .rule-list {
      margin: 0;
      padding-left: 18px;
      color: #665a53;
      font-size: 13px;
      line-height: 1.8;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 12px;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.2s ease;
    }

    button:active { transform: scale(0.99); }

    .btn-primary {
      background: linear-gradient(135deg, #c9341a 0%, #8b1a0a 100%);
      color: #fff;
      box-shadow: 0 8px 18px rgba(201, 52, 26, 0.22);
    }

    .btn-secondary {
      background: #fff;
      color: #c9341a;
      border: 1px solid rgba(201, 52, 26, 0.18);
    }

    .btn-primary:disabled,
    .btn-secondary:disabled {
      background: #c9c9c9;
      color: #fff;
      border: none;
      cursor: not-allowed;
      box-shadow: none;
    }

    .hint {
      font-size: 12px;
      color: #8b8078;
      margin-top: 10px;
      line-height: 1.7;
      text-align: center;
    }

    .result {
      margin-top: 16px;
      background: linear-gradient(180deg, #f6fff7 0%, #eef9ef 100%);
      border: 1px solid #d6ead6;
      border-radius: 16px;
      padding: 16px;
      line-height: 1.95;
      font-size: 14px;
      color: #30553a;
      box-shadow: 0 4px 10px rgba(74, 132, 87, 0.06);
    }

    .result strong {
      color: #1f6f35;
    }

    .error {
      margin-top: 16px;
      background: linear-gradient(180deg, #fff5f4 0%, #fff0ef 100%);
      border: 1px solid #f0c9c4;
      border-radius: 16px;
      padding: 16px;
      line-height: 1.8;
      font-size: 14px;
      color: #b42318;
      box-shadow: 0 4px 10px rgba(180, 35, 24, 0.04);
      word-break: break-word;
    }

    .footer-note {
      text-align: center;
      margin-top: 16px;
      font-size: 11px;
      color: #9b8f87;
      letter-spacing: 0.08em;
    }

    @media (max-width: 480px) {
      .title { font-size: 26px; }
      .prize-name { font-size: 24px; }
      .card { padding: 20px 14px 16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-deco"></div>

    <div class="card">
      <div class="brand">
        <div class="brand-small">活動優惠券</div>
        <div class="title">領取優惠券</div>
        <div class="subtitle">
          請確認下方活動與獎項資訊後，<br />
          再按下按鈕完成領券。
        </div>
      </div>

      <div class="hero-box">
        <div class="event-chip">活動名稱</div>
        <div class="event-name" id="eventName">載入中...</div>

        <div class="prize-label">獎項名稱</div>
        <div class="prize-name" id="prizeName">載入中...</div>

        <div class="meta">
          <div><strong>品項代碼：</strong><span id="couponNameCodeText">載入中...</span></div>
          <div><strong>領券方式：</strong><span id="sourceText">載入中...</span></div>
        </div>
      </div>

      <div class="rule-box">
        <div class="rule-title">說明</div>
        <ol class="rule-list">
          <li>實際啟用日、到期日、備註會依後台設定為主。</li>
          <li>領取成功後可前往我的優惠券查看。</li>
          <li>使用時由店員於券包中確認後按下使用。</li>
        </ol>
      </div>

      <button id="claimBtn" class="btn-primary" onclick="claimCoupon()">
        確認領券
      </button>

      <button class="btn-secondary" onclick="goToCouponList()">
        前往我的優惠券
      </button>

      <div class="hint">
        若連續重複點擊，系統可能會阻擋重複領取。
      </div>

      <div id="messageArea"></div>

      <div class="footer-note">
        領券成功後將自動跳轉至我的優惠券頁面
      </div>
    </div>
  </div>

<script>
const liffId = "2009551865-EGhyWa2w";
const gasUrl = "https://script.google.com/macros/s/AKfycbzGDuBy0OuzxnWLap5A6NB7xxT3lGC00MbJBGYthPxNEU5rwZ4te9zc4E8Z78TylV3A/exec";
const couponListUrl = "https://liff.line.me/2009551865-e6Y0VCE6";
let redirectTimer = null;

function getParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name) || "";
}

function escapeHtml(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function formatDate(value) {
  if (!value) return "";
  if (/^\d{4}\/\d{2}\/\d{2}$/.test(String(value))) return value;
  const d = new Date(value);
  if (isNaN(d.getTime())) return value || "";
  return d.toLocaleString("zh-TW");
}

async function postToGas(payload) {
  const res = await fetch(gasUrl, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  });

  const text = await res.text();

  try {
    return JSON.parse(text);
  } catch (e) {
    throw new Error("伺服器回應格式錯誤：" + text);
  }
}

async function fetchPrizeConfigs() {
  const res = await fetch(`${gasUrl}?action=getPrizeConfigs`);
  const json = await res.json();
  if (!json.success) {
    throw new Error(json.message || "讀取獎項設定失敗");
  }
  return json.data || [];
}

async function init() {
  try {
    await liff.init({ liffId });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const couponNameCode = getParam("couponNameCode") || "";
    const eventType = getParam("eventType") || "特別活動";
    const source = getParam("from") || eventType || "活動頁面";

    if (!couponNameCode) {
      throw new Error("缺少 couponNameCode");
    }

    const prizeConfigs = await fetchPrizeConfigs();
    const safeCode = String(couponNameCode || "").trim().toUpperCase();

    const prize = prizeConfigs.find(item => {
      const rowCode = String(item.couponNameCode || item["couponNameCode"] || "")
        .trim()
        .toUpperCase();
      return rowCode === safeCode;
    });

    const eventEl = document.getElementById("eventName");
    const prizeEl = document.getElementById("prizeName");
    const codeEl = document.getElementById("couponNameCodeText");
    const sourceEl = document.getElementById("sourceText");

    if (eventEl) eventEl.innerText = eventType;
    if (codeEl) codeEl.innerText = couponNameCode;
    if (sourceEl) sourceEl.innerText = source;
    if (prizeEl) {
      prizeEl.innerText =
        prize?.["品項名稱"] ||
        prize?.name ||
        "查無對應獎項名稱";
    }

    const claimBtn = document.getElementById("claimBtn");
    if (claimBtn) {
      claimBtn.disabled = false;
    }
  } catch (err) {
    renderError(err.message || "頁面初始化失敗");
    const claimBtn = document.getElementById("claimBtn");
    if (claimBtn) {
      claimBtn.disabled = true;
    }
    console.error(err);
  }
}

async function getProfile() {
  if (!liff.isLoggedIn()) {
    liff.login();
    return null;
  }
  return await liff.getProfile();
}

async function claimCoupon() {
  try {
    const btn = document.getElementById("claimBtn");
    if (btn) {
      btn.disabled = true;
      btn.innerText = "領券處理中...";
    }

    const profile = await getProfile();
    if (!profile) {
      if (btn) {
        btn.disabled = false;
        btn.innerText = "確認領券";
      }
      return;
    }

    const couponNameCode = getParam("couponNameCode") || "";
    const eventType = getParam("eventType") || "特別活動";
    const source = getParam("from") || eventType || "活動頁面";

    if (!couponNameCode) {
      throw new Error("缺少 couponNameCode");
    }

    const result = await postToGas({
      action: "claim",
      userId: profile.userId,
      name: profile.displayName || "",
      couponNameCode: couponNameCode,
      source: source
    });

    if (!result.success) {
      renderError(result.message || "領券失敗");
      if (btn) {
        btn.disabled = false;
        btn.innerText = "確認領券";
      }
      return;
    }

    renderSuccess(result.item || result.data || {}, eventType);
    if (btn) {
      btn.disabled = true;
      btn.innerText = "已完成領券";
    }
  } catch (err) {
    renderError("領券失敗：" + err.message);
    console.error(err);
    const btn = document.getElementById("claimBtn");
    if (btn) {
      btn.disabled = false;
      btn.innerText = "確認領券";
    }
  }
}

function renderSuccess(item, eventType) {
  const html = `
    <div class="result">
      <div><strong>領券成功 🎉</strong></div>
      <div><strong>活動：</strong>${escapeHtml(eventType || "")}</div>
      <div><strong>獎項：</strong>${escapeHtml(item.couponName || "")}</div>
      <div><strong>分類：</strong>${escapeHtml(item.category || "")}</div>
      <div><strong>品項代碼：</strong>${escapeHtml(item.couponNameCode || "")}</div>
      <div><strong>領取日：</strong>${formatDate(item.claimedAt || "")}</div>
      <div><strong>啟用日：</strong>${formatDate(item.activateAt || "")}</div>
      <div><strong>到期日：</strong>${formatDate(item.expireAt || "")}</div>
      <div><strong>狀態：</strong>${escapeHtml(item.status || "未使用")}</div>
      <div><strong>券號：</strong>${escapeHtml(item.couponId || "")}</div>
      ${item.note ? `<div><strong>備註：</strong>${escapeHtml(item.note)}</div>` : ""}

      <div style="margin-top:12px; color:#4b6f55; font-size:14px;">
        5 秒後自動跳轉至我的優惠券...
      </div>

      <div style="margin-top:14px;">
        <button class="btn-secondary" onclick="goToCouponList()">
          前往我的優惠券
        </button>
      </div>
    </div>
  `;

  const msg = document.getElementById("messageArea");
  if (msg) {
    msg.innerHTML = html;
  }

  if (redirectTimer) clearTimeout(redirectTimer);
  redirectTimer = setTimeout(() => {
    goToCouponList();
  }, 5000);
}

function renderError(message) {
  const msg = document.getElementById("messageArea");
  if (msg) {
    msg.innerHTML = `
      <div class="error">${escapeHtml(message)}</div>
    `;
  }
}

function goToCouponList() {
  if (redirectTimer) {
    clearTimeout(redirectTimer);
    redirectTimer = null;
  }
  window.location.href = couponListUrl;
}

init();
</script>
</body>
</html>
