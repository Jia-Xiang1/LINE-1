<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>店員核銷優惠券</title>
  <style>
    body {
      font-family: "Noto Sans TC", sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 16px;
      color: #2d1500;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 4px 12px rgba(0,0,0,.06);
      margin-bottom: 16px;
    }

    .title {
      font-size: 24px;
      font-weight: 800;
      color: #c9341a;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: #8b1a0a;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-query {
      background: #fff;
      color: #c9341a;
      border: 1px solid #c9341a33;
    }

    .btn-use {
      background: #c9341a;
      color: #fff;
    }

    .btn-use:disabled {
      background: #bbb;
      cursor: not-allowed;
    }

    .info {
      margin-top: 16px;
      background: #fff7f2;
      border: 1px dashed #c9341a66;
      border-radius: 14px;
      padding: 14px;
      line-height: 1.9;
      font-size: 14px;
    }

    .success {
      margin-top: 16px;
      background: #f6fbf4;
      border: 1px solid #d7ebd1;
      border-radius: 14px;
      padding: 14px;
      line-height: 1.9;
      font-size: 14px;
    }

    .error {
      margin-top: 16px;
      background: #fff2f1;
      border: 1px solid #f3c7c1;
      border-radius: 14px;
      padding: 14px;
      line-height: 1.8;
      font-size: 14px;
      color: #b42318;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      margin-left: 8px;
    }

    .badge-pending {
      background: #fff2cc;
      color: #8a6d1d;
    }

    .badge-available {
      background: #e9f8ec;
      color: #187a2f;
    }

    .badge-used {
      background: #ececec;
      color: #666;
    }

    .badge-expired {
      background: #fdeaea;
      color: #b42318;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">👨‍🍳 店員核銷頁</div>
      <div class="subtitle">
        請輸入或貼上顧客出示的券號，再進行查詢與核銷。
      </div>

      <label for="couponIdInput">券號</label>
      <input id="couponIdInput" type="text" placeholder="請輸入 couponId" />

      <div class="actions">
        <button class="btn-query" onclick="queryCoupon()">查詢券資訊</button>
        <button id="useBtn" class="btn-use" onclick="confirmUse()" disabled>確認核銷</button>
      </div>

      <div id="resultArea"></div>
    </div>
  </div>

<script>
const gasUrl = "https://script.google.com/macros/s/AKfycbxBsh3bbOKRjVv_M-nGkcergiYVSn215sdNr1j6rO_wyfrBy8NLQGZ0JxyOqlD3c8A/exec";
let currentCoupon = null;

async function postToGas(payload) {
  const formBody = new URLSearchParams(payload).toString();

  const res = await fetch(gasUrl, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: formBody
  });

  const text = await res.text();

  try {
    return JSON.parse(text);
  } catch (e) {
    throw new Error("伺服器回應格式錯誤：" + text);
  }
}

async function queryCoupon() {
  try {
    const couponId = document.getElementById("couponIdInput").value.trim();
    if (!couponId) {
      renderError("請先輸入券號");
      return;
    }

    const result = await postToGas({
      action: "getCoupon",
      couponId: couponId
    });

    if (!result.success) {
      currentCoupon = null;
      document.getElementById("useBtn").disabled = true;
      renderError(result.message || "查詢失敗");
      return;
    }

    currentCoupon = result.item;
    renderCouponInfo(result.item);
  } catch (err) {
    currentCoupon = null;
    document.getElementById("useBtn").disabled = true;
    renderError("查詢失敗：" + err.message);
    console.error(err);
  }
}

async function confirmUse() {
  try {
    if (!currentCoupon) {
      renderError("請先查詢券資訊");
      return;
    }

    const ok = confirm("請確認顧客已出示此券，是否核銷？");
    if (!ok) return;

    const result = await postToGas({
      action: "use",
      couponId: currentCoupon.couponId
    });

    if (!result.success) {
      renderError(result.message || "核銷失敗");
      return;
    }

    currentCoupon = result.item;
    renderSuccess(result.item, result.message || "核銷成功");
  } catch (err) {
    renderError("核銷失敗：" + err.message);
    console.error(err);
  }
}

function renderCouponInfo(item) {
  const statusInfo = getDisplayStatus(item.status, item.activateAt, item.expireAt);
  const canUse = statusInfo.text === "可使用";

  document.getElementById("useBtn").disabled = !canUse;

  document.getElementById("resultArea").innerHTML = `
    <div class="info">
      <div><strong>券別：</strong>${escapeHtml(item.coupon)}</div>
      <div><strong>分類：</strong>${escapeHtml(item.category)}</div>
      <div><strong>顧客名稱：</strong>${escapeHtml(item.name || "")}</div>
      <div><strong>領取日：</strong>${formatDate(item.claimedAt)}</div>
      <div><strong>啟用日：</strong>${formatDate(item.activateAt)}</div>
      <div><strong>使用日：</strong>${item.usedAt ? formatDate(item.usedAt) : "尚未使用"}</div>
      <div><strong>到期日：</strong>${formatDate(item.expireAt)}</div>
      <div>
        <strong>狀態：</strong>${statusInfo.text}
        <span class="badge ${statusInfo.className}">${statusInfo.text}</span>
      </div>
      <div><strong>券號：</strong>${escapeHtml(item.couponId)}</div>
    </div>
  `;
}

function renderSuccess(item, message) {
  const statusInfo = getDisplayStatus(item.status, item.activateAt, item.expireAt);
  document.getElementById("useBtn").disabled = true;

  document.getElementById("resultArea").innerHTML = `
    <div class="success">
      <div><strong>${escapeHtml(message)}</strong></div>
      <div><strong>券別：</strong>${escapeHtml(item.coupon)}</div>
      <div><strong>顧客名稱：</strong>${escapeHtml(item.name || "")}</div>
      <div><strong>使用日：</strong>${item.usedAt ? formatDate(item.usedAt) : ""}</div>
      <div>
        <strong>狀態：</strong>${statusInfo.text}
        <span class="badge ${statusInfo.className}">${statusInfo.text}</span>
      </div>
      <div><strong>券號：</strong>${escapeHtml(item.couponId)}</div>
    </div>
  `;
}

function renderError(message) {
  document.getElementById("resultArea").innerHTML = `
    <div class="error">${escapeHtml(message)}</div>
  `;
}

function getDisplayStatus(status, activateAt, expireAt) {
  const now = new Date();
  const activateAtDate = new Date(activateAt);
  const expireAtDate = new Date(expireAt);

  if (status === '已使用') {
    return { text: '已使用', className: 'badge-used' };
  }

  if (now < activateAtDate) {
    return { text: '未啟用', className: 'badge-pending' };
  }

  if (now > expireAtDate) {
    return { text: '已過期', className: 'badge-expired' };
  }

  return { text: '可使用', className: 'badge-available' };
}

function formatDate(value) {
  const d = new Date(value);
  if (isNaN(d.getTime())) return value || "";
  return d.toLocaleString("zh-TW");
}

function escapeHtml(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}
</script>
</body>
</html>
